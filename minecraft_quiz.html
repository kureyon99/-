<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- iOS Webアプリ対応 (iPadOS 26以降の「Webアプリとして開く」でフルスクリーン動作) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>マイクラ クラフトクイズ</title>
<style>
/* =====================================================
   CSS変数 — window.innerHeightをJSで --avh に設定して使う
   これによりiOS Safariのアドレスバー分の誤差を解消
   ===================================================== */
:root {
  --avh: 100px; /* JSで上書きされる */
  --mc-bg: #c6c6c6;
  --mc-dark: #373737;
  --mc-slot: #8b8b8b;
  --mc-tl: #373737;
  --mc-br: #ffffff;
  --mc-ptl: #ffffff;
  --mc-pbr: #555555;
  --mc-text: #404040;
  --mc-green: #5a9e4a;
  --mc-gl: #7acc5a;
  --mc-gd: #3d7a2a;
  --mc-sel: #6e9fd8;
  --mc-sel-tl: #4a78b0;
  --mc-sel-br: #a8d4ff;
  /* 固定バーの高さ定数 */
  --topbar-h: 32px;
  --bottom-h: 60px;
}

*,*::before,*::after {
  box-sizing: border-box; margin: 0; padding: 0;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none; /* iOS長押しメニューを完全ブロック */
  touch-action: manipulation;
}

/* img要素に念押しで適用 */
img {
  -webkit-touch-callout: none;
  pointer-events: none; /* 画像自体へのタッチイベントを無効化 */
}

html {
  /* iOS Safariの100vh問題を回避: html自体は固定しない */
  height: 100%;
}

body {
  width: 100%;
  /* window.innerHeightをCSSカスタムプロパティで使う */
  height: calc(var(--avh) * 1px);
  overflow: hidden;
  background: #1a1a1a;
  font-family: "Courier New","Monaco","Hiragino Kaku Gothic ProN","Meiryo",monospace;
  color: var(--mc-text);
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--mc-bg);
  overflow: hidden;
  position: relative;
}

/* =====================================================
   共通パーツ
   ===================================================== */
/* MCスタイルボーダー（左上が明るく、右下が暗い = 出っ張り感） */
.mc-raised {
  border: 3px solid;
  border-color: var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
}
/* MCスタイルボーダー（スロット内側 = 凹み感） */
.mc-inset {
  border: 3px solid;
  border-color: var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
}

/* =====================================================
   TOP BAR
   ===================================================== */
#topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  flex-shrink: 0;
  background: #484848;
  border-bottom: 3px solid var(--mc-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 0 12px;
}
#topbar-title {
  color:#fff; font-size:13px; font-weight:bold; text-shadow:2px 2px 0 #000; letter-spacing:1px;
  display:flex; align-items:center; gap:6px;
}
#topbar-counter { color:#aaa; font-size:10px; text-shadow:1px 1px 0 #000; }

/* =====================================================
   MAIN AREA (flex:1, contains everything except bars)
   ===================================================== */
#main {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

/* =====================================================
   BOTTOM BAR — 3 colored buttons
   ===================================================== */
#bottom-bar {
  height: var(--bottom-h);
  min-height: var(--bottom-h);
  flex-shrink: 0;
  border-top: 3px solid var(--mc-dark);
  background: #707070;
  display: flex;
  align-items: stretch;
  padding: 6px 8px;
  gap: 8px;
}
.mc-btn {
  font-family: inherit;
  font-weight: bold;
  color: #fff;
  background: #6e6e6e;
  border: 3px solid;
  border-color: #aaa var(--mc-dark) var(--mc-dark) #aaa;
  cursor: pointer;
  text-shadow: 2px 2px 0 #000;
  white-space: nowrap;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  line-height: 1;
  transition: filter .05s;
  -webkit-appearance: none;
}
.mc-btn:active { border-color: var(--mc-dark) #aaa #aaa var(--mc-dark); filter: brightness(.88); }
.mc-btn.sub {
  flex: 1; padding: 0;
  font-size: clamp(15px, 2vw, 22px);
  min-height: 0;
}
.mc-btn.reset-btn { background:#3a7fc1; border-color:#6db0f0 #1a4f8a #1a4f8a #6db0f0; }
.mc-btn.reset-btn:active { border-color:#1a4f8a #6db0f0 #6db0f0 #1a4f8a; }
.mc-btn.hint-btn  { background:#c87820; border-color:#f0aa50 #8a4a08 #8a4a08 #f0aa50; }
.mc-btn.hint-btn:active  { border-color:#8a4a08 #f0aa50 #f0aa50 #8a4a08; }
.mc-btn.next-btn  { background:#7a3ab8; border-color:#aa70e8 #4a1878 #4a1878 #aa70e8; }
.mc-btn.next-btn:active  { border-color:#4a1878 #aa70e8 #aa70e8 #4a1878; }
.mc-btn.green { background:var(--mc-green); border-color:var(--mc-gl) var(--mc-gd) var(--mc-gd) var(--mc-gl); }
.mc-btn.green:active { border-color:var(--mc-gd) var(--mc-gl) var(--mc-gl) var(--mc-gd); }

/* =====================================================
   作る！ボタン — 基底スタイル（各メディアクエリで上書き）
   ===================================================== */
.mc-btn.craft-main {
  background: var(--mc-green);
  border-color: var(--mc-gl) var(--mc-gd) var(--mc-gd) var(--mc-gl);
  border-width: 4px;
  flex-direction: column;
  gap: 2px; padding: 0;
  line-height: 1.3; letter-spacing: 0;
  box-shadow: 0 4px 14px rgba(0,0,0,.4);
  flex-shrink: 0;
}
.mc-btn.craft-main span {
  display: block;
  transform: translateY(-1px);
}
.mc-btn.craft-main:active { border-color:var(--mc-gd) var(--mc-gl) var(--mc-gl) var(--mc-gd); }

/* =====================================================
   CRAFT slots & INV slots — 共通スタイル
   ===================================================== */
.craft-slot {
  background: var(--mc-slot);
  border: 3px solid;
  border-color: var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: background .08s;
  /* サイズは各レイアウトで上書き */
}
.craft-slot:active { border-color: var(--mc-br) var(--mc-tl) var(--mc-tl) var(--mc-br); background:#888; }
.craft-slot img.placed-item {
  width:74%; height:74%;
  object-fit:contain; image-rendering:pixelated;
  position:relative; z-index:3;
  filter: drop-shadow(1px 1px 2px rgba(0,0,0,.4));
}
.craft-slot img.hint-ghost {
  position:absolute; width:66%; height:66%;
  object-fit:contain; image-rendering:pixelated;
  opacity:.3; z-index:1; pointer-events:none; filter:brightness(1.3);
}

.inv-slot {
  background: var(--mc-slot);
  border: 3px solid;
  border-color: var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  cursor: pointer; position: relative;
  transition: background .1s;
  overflow: hidden;
  min-height: 0; min-width: 0;
  gap: 2px; padding: 4px 3px 5px;
}
.inv-slot:active { border-color: var(--mc-br) var(--mc-tl) var(--mc-tl) var(--mc-br); background:#888; }
.inv-slot img {
  width:54%; height:auto; max-height:54%;
  object-fit:contain; image-rendering:pixelated; flex-shrink:0;
  filter: drop-shadow(1px 1px 1px rgba(0,0,0,.35));
}
.inv-slot .inv-name {
  font-size: clamp(8px, 1.1vw, 13px);
  font-weight: bold; color:#fff; text-shadow:1px 1px 0 #000;
  text-align:center; line-height:1.2;
  word-break:keep-all; overflow:hidden; width:100%; padding:0 2px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  flex-shrink:0;
}
.inv-slot.selected { background:var(--mc-sel); border-color:var(--mc-sel-tl) var(--mc-sel-br) var(--mc-sel-br) var(--mc-sel-tl); }
.inv-slot.hint-glow { animation: invGlow .6s ease-in-out infinite alternate; }
@keyframes invGlow {
  from { background:var(--mc-slot); box-shadow:none; }
  to   { background:#f0d050; box-shadow:inset 0 0 12px rgba(255,215,0,.7); }
}

/* 素材タグ */
.mat-tag {
  display:inline-flex; align-items:center; gap:5px;
  padding: 4px 8px;
  background: var(--mc-bg);
  border:2px solid; border-color:var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
  white-space:nowrap; font-weight:bold; transition:all .3s;
}
.mat-tag img { image-rendering:pixelated; object-fit:contain; }
.mat-tag.done { color:var(--mc-gd); background:#b6e8a0; border-color:#7acc5a #3d7a2a #3d7a2a #7acc5a; }

/* 矢印ボックス */
#arrow-icon {
  width:34px; height:34px;
  background:var(--mc-bg);
  border:2px solid; border-color:var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--mc-text); flex-shrink:0;
  position: relative;
}
#arrow-icon::before {
  content:"";
  width: 22px;
  height: 14px;
  background: #4a4a4a;
  clip-path: polygon(0 32%, 58% 32%, 58% 0, 100% 50%, 58% 100%, 58% 68%, 0 68%);
  box-shadow: 2px 2px 0 rgba(255,255,255,.45);
}

/* ステータスメッセージ */
#status-msg { font-weight:bold; color:transparent; text-align:center; transition:color .3s; flex-shrink:0; }
#status-msg.fail    { color:#ff4444; text-shadow:1px 1px 0 #800; }
#status-msg.success { color:var(--mc-green); text-shadow:1px 1px 0 #2a5a1a; }

/* 結果スロット */
#result-slot {
  background:var(--mc-slot);
  border:3px solid; border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
#result-slot img { width:74%; height:74%; object-fit:contain; image-rendering:pixelated; filter:drop-shadow(1px 1px 2px rgba(0,0,0,.4)); }

/* ターゲットスロット */
#target-slot {
  background:var(--mc-slot);
  border:3px solid; border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
#target-slot img { width:82%; height:82%; object-fit:contain; image-rendering:pixelated; }

/* =====================================================
   TITLE SCREEN
   ===================================================== */
#title-screen {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  z-index: 500;
  background: #120f0b;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
}
#title-screen::before {
  content:"";
  position:absolute; inset:0;
  background:
    linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.5)),
    url("ui_assets/title_workshop_bg.png") center / cover no-repeat;
  transform: none;
  pointer-events:none;
}
#title-screen::after {
  content:"";
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0) 0 32%, rgba(0,0,0,.24) 70%, rgba(0,0,0,.5) 100%),
    linear-gradient(180deg, rgba(255,255,255,.18), rgba(0,0,0,0) 24%, rgba(0,0,0,.42));
  opacity:1;
  pointer-events:none;
}
/* タイトル背景：ブロックのグリッドを落ち着いた地形風に表示 */
#title-bg {
  position: absolute; top:0; left:0; right:0; bottom:0;
  display: grid;
  opacity: 0;
  pointer-events: none;
}
.title-bg-block {
  background: #6d8f4a;
  border: 1px solid rgba(0,0,0,.28);
  box-shadow: inset 1px 1px 0 rgba(255,255,255,.12), inset -1px -1px 0 rgba(0,0,0,.18);
  animation: bgPulse 4.8s ease-in-out infinite;
}
@keyframes bgPulse {
  0%,100% { opacity: 0.7; filter: brightness(.96); }
  50%      { opacity: 1; filter: brightness(1.08); }
}

/* タイトルロゴ */
#title-logo {
  position: relative; z-index:2;
  text-align: center;
  margin-bottom: 16px;
  padding: 0 16px;
}
#title-logo::before {
  content:none;
}
#title-logo-main {
  font-family: "Courier New", monospace;
  font-size: clamp(32px, 8vw, 72px);
  font-weight: bold;
  color: #f5d56a;
  text-shadow:
    4px 4px 0 #6c5220,
    -2px -2px 0 #000,
    2px -2px 0 #000,
    -2px 2px 0 #000,
    6px 6px 0 rgba(0,0,0,.5);
  letter-spacing: 2px;
  animation: titleFloat 2.5s ease-in-out infinite;
  display: block;
  line-height: 1.1;
}
#title-logo-sub {
  font-family: "Courier New", monospace;
  font-size: clamp(14px, 3vw, 26px);
  font-weight: bold;
  color: #b8f0a8;
  text-shadow: 2px 2px 0 #1f5424, -1px -1px 0 #000;
  letter-spacing: 3px;
  display: block;
  margin-top: 4px;
  animation: titleFloat 2.5s ease-in-out infinite .4s;
}
@keyframes titleFloat {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-8px); }
}

/* タイトル画面のアイテムアイコン帯 */
#title-items {
  position: relative; z-index:2;
  display: flex; gap: clamp(8px, 2vw, 18px);
  margin-bottom: clamp(20px, 4vh, 40px);
  padding: 8px;
  background: rgba(26, 18, 12, .58);
  border: 3px solid rgba(255, 224, 150, .42);
  box-shadow: 0 10px 28px rgba(0,0,0,.32);
}
.title-item-slot {
  width: clamp(44px, 8vw, 70px);
  height: clamp(44px, 8vw, 70px);
  background: #9f9f9f;
  border: 3px solid;
  border-color: #333 #efefef #efefef #333;
  display: flex; align-items: center; justify-content: center;
  animation: titleItemBob 1.8s ease-in-out infinite;
  box-shadow: 0 6px 0 rgba(0,0,0,.24);
}
.title-item-slot:nth-child(2) { animation-delay: .2s; }
.title-item-slot:nth-child(3) { animation-delay: .4s; }
.title-item-slot:nth-child(4) { animation-delay: .6s; }
.title-item-slot:nth-child(5) { animation-delay: .8s; }
.title-item-slot img {
  width: 78%; height: 78%;
  object-fit: contain; image-rendering: pixelated;
}
@keyframes titleItemBob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

/* スタートボタン */
#btn-start {
  position: relative; z-index:2;
  font-family: "Courier New", monospace;
  font-size: clamp(18px, 4vw, 32px);
  font-weight: bold;
  color: #fff;
  background: #5a9e4a;
  border: 4px solid;
  border-color: #7acc5a #3d7a2a #3d7a2a #7acc5a;
  padding: clamp(12px, 2.5vh, 20px) clamp(30px, 8vw, 80px);
  cursor: pointer;
  text-shadow: 2px 2px 0 #000;
  letter-spacing: 2px;
  animation: startPulse 1s ease-in-out infinite;
  -webkit-appearance: none;
  display: inline-flex;
  align-items: center;
  gap: 12px;
}
@keyframes startPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(90,158,74,0); transform: scale(1); }
  50%      { box-shadow: 0 0 24px 8px rgba(90,158,74,.5); transform: scale(1.04); }
}
#btn-start:active {
  border-color: #3d7a2a #7acc5a #7acc5a #3d7a2a;
  transform: scale(0.97);
}

/* タイトルのコピー文 */
#title-copy {
  position: relative; z-index:2;
  margin-top: clamp(10px, 2vh, 18px);
  color: #888;
  font-size: clamp(9px, 1.5vw, 13px);
  font-family: "Courier New", monospace;
  text-align: center;
  letter-spacing: 1px;
}

/* タイトル画面の流れ星パーティクル */
#title-particles {
  position: absolute; top:0; left:0; right:0; bottom:0;
  pointer-events: none; z-index:1; overflow:hidden;
  mix-blend-mode: screen;
  opacity: .65;
}
.title-star {
  position: absolute;
  width: 8px; height: 8px;
  background: #f5d56a;
  animation: starFall linear infinite;
  opacity: 0;
  box-shadow: 8px 0 0 rgba(245,213,106,.75), 0 8px 0 rgba(245,213,106,.55);
}
@keyframes starFall {
  0%   { opacity:0; transform: translateY(-20px) rotate(0deg); }
  10%  { opacity:1; }
  90%  { opacity:1; }
  100% { opacity:0; transform: translateY(110vh) rotate(720deg); }
}

/* タイトル → ゲーム 遷移 */
#title-screen.hide {
  animation: titleFadeOut .5s ease-in forwards;
}
@keyframes titleFadeOut {
  0%   { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(1.05); }
}

/* =====================================================
   SUCCESS MODAL — マインクラフト実績解除風
   ===================================================== */
#success-modal {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  background: rgba(0,0,0,.78);
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 300;
  overflow: hidden;
  padding: 88px 16px 112px;
}
#success-modal.show { display:flex; }

/* 実績バナー（上からスライドイン） */
#achievement-banner {
  position: fixed;
  top: calc(max(64px, env(safe-area-inset-top)) + 4px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  background:
    linear-gradient(180deg, rgba(52,52,52,.94) 0 50%, rgba(24,24,24,.96) 50% 100%);
  border: 3px solid #f5d56a;
  border-color: #fff0a8 #8b6f24 #8b6f24 #fff0a8;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 0;
  animation: bannerSlide .5s cubic-bezier(.175,.885,.32,1.275) forwards;
  box-shadow: 0 7px 0 rgba(0,0,0,.34), 0 0 18px rgba(245,213,106,.2);
  width: min(90vw, 460px);
}
@keyframes bannerSlide {
  0%   { opacity:0; transform: translate(-50%, -60px); }
  100% { opacity:1; transform: translate(-50%, 0); }
}
#achievement-icon {
  width: clamp(42px,7vw,60px); height: clamp(42px,7vw,60px);
  background: #8d8d8d;
  border: 3px solid;
  border-color: #333 #fff #fff #333;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  animation: iconSpin .6s cubic-bezier(.175,.885,.32,1.275) .3s both;
  box-shadow: inset 0 0 0 3px rgba(0,0,0,.1);
}
@keyframes iconSpin {
  0%   { transform: scale(0) rotate(-180deg); }
  100% { transform: scale(1) rotate(0deg); }
}
#achievement-icon img {
  width:80%; height:80%; object-fit:contain; image-rendering:pixelated;
}
#achievement-text { display:flex; flex-direction:column; gap:3px; }
#achievement-label {
  color: #f5d56a;
  font-size: clamp(10px,1.8vw,15px);
  font-family: "Courier New", monospace;
  font-weight: bold;
  text-shadow: 1px 1px 0 #5a4214;
  letter-spacing: 1px;
}
#achievement-name {
  color: #fff;
  font-size: clamp(14px,2.5vw,22px);
  font-family: "Courier New", monospace;
  font-weight: bold;
  text-shadow: 2px 2px 0 #000;
}

/* 完成アイテム大表示 */
#success-item-img { position: relative; z-index: 2; object-fit:contain; image-rendering:pixelated; }
@keyframes itemAppear {
  0%   { transform:scale(0); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

#success-text {
  position: relative;
  z-index: 2;
  color: #f5d56a;
  font-size: clamp(24px,5vw,44px);
  font-weight: bold;
  font-family: "Courier New", monospace;
  margin-top: 0;
  text-shadow: 3px 3px 0 #000, 0 0 20px rgba(245,213,106,.6);
  animation: itemAppear .35s cubic-bezier(.175,.885,.32,1.275) .2s both;
}
#success-sub {
  position: relative;
  z-index: 2;
  color: #b8f0a8;
  font-size: clamp(11px,1.8vw,17px);
  font-family: "Courier New", monospace;
  margin-top: 6px;
  text-shadow: 1px 1px 0 #000;
  animation: itemAppear .4s ease .9s both;
}

/* チャット欄風メッセージ */
#chat-log {
  position: fixed;
  bottom: 80px; left: 0; right: 0;
  display: flex; flex-direction: column;
  align-items: flex-start;
  padding: 0 12px;
  pointer-events: none;
  z-index: 350;
}
.chat-line {
  background: rgba(0,0,0,.7);
  color: #fff;
  font-family: "Courier New", monospace;
  font-size: clamp(11px, 1.8vw, 16px);
  padding: 3px 8px;
  margin-bottom: 2px;
  animation: chatSlide .3s ease forwards;
  max-width: 90vw;
}
@keyframes chatSlide {
  0%   { opacity:0; transform:translateX(-20px); }
  100% { opacity:1; transform:translateX(0); }
}

#success-modal .mc-btn {
  position: relative;
  z-index: 2;
}
#success-modal #btn-more {
  position: fixed;
  left: 50%;
  bottom: calc(max(24px, env(safe-area-inset-bottom)) + 8px);
  transform: translateX(-50%);
  margin-top: 0;
  min-width: min(78vw, 260px);
  font-size: clamp(16px,2.5vw,22px);
  padding: 15px 34px;
  background: #4f9d70;
  border-color: #8ee5ad #245a3d #245a3d #8ee5ad;

    0 8px 0 rgba(0,0,0,.42),
    0 0 0 4px rgba(0,0,0,.24),
    0 0 24px rgba(105,226,139,.28);

/* =====================================================
   PARTICLES — ピクセルブロック欠片
   ===================================================== */
#particles-container {
  position:fixed; top:0;left:0;right:0;bottom:0;
  pointer-events:none; z-index:310; overflow:hidden;
}
/* ピクセル欠片（四角） */
.px-particle {
  position: absolute;
  image-rendering: pixelated;
  animation: pxFly var(--dur,1s) ease-out var(--delay,0s) forwards;
  box-shadow: inset 1px 1px 0 rgba(255,255,255,.18), inset -1px -1px 0 rgba(0,0,0,.22);
}
@keyframes pxFly {
  0%   { opacity:1; transform:translate(0,0) rotate(0deg) scale(1); }
  100% { opacity:0; transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(.3); }
}
.confetti-piece {
  position: absolute;
  width: var(--w, 10px);
  height: var(--h, 6px);
  background: var(--color, #f5d56a);
  image-rendering: pixelated;
  box-shadow: inset 1px 1px 0 rgba(255,255,255,.28), inset -1px -1px 0 rgba(0,0,0,.18);
  animation: confettiBurst var(--dur, 1.4s) cubic-bezier(.16,.68,.32,1) var(--delay,0s) forwards;
}
@keyframes confettiBurst {
  0% { opacity:0; transform:translate(0,0) rotate(0deg) scale(.8); }
  12% { opacity:1; }
  65% { opacity:1; transform:translate(var(--mid-x), var(--mid-y)) rotate(var(--rot-mid)) scale(1); }
  100% { opacity:0; transform:translate(var(--end-x), var(--end-y)) rotate(var(--rot-end)) scale(.9); }
}
/* アニメーション */
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes shake { 0%,100%{transform:none} 10%,50%,90%{transform:translateX(-6px)} 30%,70%{transform:translateX(6px)} }
.shake-anim { animation:shake .4s cubic-bezier(.36,.07,.19,.97); }


/* =====================================================

<body>

<script>
// =====================================================
// iOS Safari 100vh バグ修正 + craft-slot サイズ動的計算
// =====================================================
function setLayout() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const root = document.documentElement;
  root.style.setProperty('--avh', H);
  const isLandscape = W > H;
  if (isLandscape) {
    const topbarH=32, targetH=100+6*2+3*2, materialsH=40, bottomH=74;
    const craftCenterH = H - topbarH - targetH - materialsH - bottomH;
    const available = craftCenterH - 22 - 18 - 5;
    const slotSize = Math.floor(Math.max(60, Math.min(available / 3, 150)));
    root.style.setProperty('--slot-size', slotSize + 'px');
  } else {
    const topbarH=32, bottomH=74;
    const leftAreaH = (H - topbarH - bottomH) * 0.55;
    const targetH=72+5*2+3*2, materialsH=38;
    const craftCenterH = leftAreaH - targetH - materialsH;
    const available = craftCenterH - 16 - 8 - 4;
    const slotSizeByH = Math.floor(Math.max(55, Math.min(available / 3, 120)));
    const slotSizeByW = Math.floor(Math.max(55, Math.min((W * 0.85 - 58) / 4, 120)));
    const slotSize = Math.min(slotSizeByH, slotSizeByW);
    root.style.setProperty('--slot-size-p', slotSize + 'px');
  }
}
window.addEventListener('resize', setLayout);
window.addEventListener('orientationchange', () => { setTimeout(setLayout, 120); });
setLayout();
// iOS長押しメニューをJSでも完全ブロック
document.addEventListener('contextmenu', e => e.preventDefault());

// =====================================================
// TITLE SCREEN
// =====================================================
function initTitleScreen() {
  // 背景ブロックグリッド生成
  const bg = document.getElementById('title-bg');
  const cols = Math.ceil(window.innerWidth / 48) + 1;
  const rows = Math.ceil(window.innerHeight / 48) + 1;
  bg.style.gridTemplateColumns = `repeat(${cols}, 48px)`;
  bg.style.gridTemplateRows = `repeat(${rows}, 48px)`;
  bg.innerHTML = '';
  const blockColors = ['#6f9a4e','#5f8a43','#7a5b3b','#684a32','#4b392b','#8a8a8a'];
  for (let i = 0; i < cols * rows; i++) {
    const b = document.createElement('div');
    b.className = 'title-bg-block';
    b.style.background = blockColors[Math.floor(Math.random() * blockColors.length)];
    b.style.animationDelay = (Math.random() * 3) + 's';
    b.style.animationDuration = (2 + Math.random() * 2) + 's';
    bg.appendChild(b);
  }

  // タイトル画面アイテム表示（ランダム5種）
  const titleItemKeys = ['diamond_pickaxe','diamond_sword','gold_axe','iron_chestplate','bow','torch','crafting_table','furnace'];
  const picked = titleItemKeys.sort(()=>Math.random()-.5).slice(0,5);
  const itemsEl = document.getElementById('title-items');
  itemsEl.innerHTML = '';
  picked.forEach(key => {
    const slot = document.createElement('div');
    slot.className = 'title-item-slot';
    const img = document.createElement('img');
    img.src = IMG[key] || '';
    img.draggable = false;
    img.onerror = () => { img.style.opacity='.3'; };
    slot.appendChild(img);
    itemsEl.appendChild(slot);
  });

  // 流れ星パーティクル
  const tp = document.getElementById('title-particles');
  tp.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('div');
    s.className = 'title-star';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (Math.random() * 100) + '%';
    s.style.width = s.style.height = (4 + Math.random() * 8) + 'px';
    const starColors = ['#f5d56a','#b8f0a8','#8bd0ff','#ffffff'];
    s.style.background = starColors[Math.floor(Math.random() * starColors.length)];
    s.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    s.style.animationDuration = (4 + Math.random() * 6) + 's';
    s.style.animationDelay = (Math.random() * 8) + 's';
    tp.appendChild(s);
  }

  // スタートボタン
  document.getElementById('btn-start').addEventListener('click', () => {
    const initAudio = () => {
      if (!game.audioCtx) game.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (game.audioCtx.state === 'suspended') game.audioCtx.resume();
    };
    initAudio();
    game.playSound('start');
    const ts = document.getElementById('title-screen');
    ts.classList.add('hide');
    setTimeout(() => {
      ts.style.display = 'none';
      // タイトルが消えてから初めて読み上げ
      game.speak(game.currentRecipe ? (items[game.currentRecipe.id].yomi || items[game.currentRecipe.id].name) + ' を つくろう！' : '');
    }, 500);
  });
}

// =====================================================
// CHAT LOG
// =====================================================
function showChatLine(html, duration=3500) {
  const log = document.getElementById('chat-log');
  const line = document.createElement('div');
  line.className = 'chat-line';
  line.innerHTML = html;
  log.appendChild(line);
  setTimeout(() => {
    line.style.transition = 'opacity .5s';
    line.style.opacity = '0';
    setTimeout(() => line.remove(), 500);
  }, duration);
}

// =====================================================
// IMAGE URLS — local files in items
// =====================================================
const IMG = {
  diamond_pickaxe:    'items/diamond_pickaxe.png',
  iron_pickaxe:       'items/iron_pickaxe.png',

  wood_hoe:           'items/wood_hoe.png',
  diamond_helmet:     'items/diamond_helmet.png',
  iron_helmet:        'items/iron_helmet.png',
  gold_helmet:        'items/gold_helmet.png',
  diamond_chestplate: 'items/diamond_chestplate.png',
  iron_chestplate:    'items/iron_chestplate.png',
  gold_chestplate:    'items/gold_chestplate.png',
  diamond_leggings:   'items/diamond_leggings.png',
  iron_leggings:      'items/iron_leggings.png',
  gold_leggings:      'items/gold_leggings.png',
  diamond_boots:      'items/diamond_boots.png',
  iron_boots:         'items/iron_boots.png',
  gold_boots:         'items/gold_boots.png',
  bow:                'items/bow.png',
  arrow:              'items/arrow.png',

const game = {
  currentRecipe:null, gridState:Array(9).fill(null),
  selectedItem:null, hintActive:false,
  audioCtx:null, voices:[], questionCount:0, correctCount:0,

  init() {
    this.buildCraftGrid();
    this.buildInventory();
    document.getElementById('btn-reset').addEventListener('click', () => this.resetGrid());
    document.getElementById('btn-hint').addEventListener('click',  () => this.toggleHint());
    document.getElementById('btn-craft').addEventListener('click', () => this.checkRecipe());
    document.getElementById('btn-next').addEventListener('click',  () => this.nextQuestion());
    document.getElementById('btn-more').addEventListener('click',  () => this.nextQuestion());
    const initAudio = () => {
      if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    };
    document.addEventListener('touchstart', initAudio, {once:true});
    document.addEventListener('click', initAudio, {once:true});
    if (window.speechSynthesis) {
      this.voices = speechSynthesis.getVoices();
      speechSynthesis.onvoiceschanged = () => { this.voices = speechSynthesis.getVoices(); };
    }
    setLayout();
    initTitleScreen();
    this.nextQuestion();
  },

  speak(text) {
    try {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang='ja-JP'; u.rate=0.9; u.pitch=1.05;
      const v = this.voices.find(v => v.lang && v.lang.includes('ja'));
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch(e) {}
  },

  playSound(type) {
    if (!this.audioCtx) return;
    try {
      const ctx = this.audioCtx, now = ctx.currentTime;

      if (type === 'start') {
        // タイトル画面スタート：上昇するファンファーレ
        [[261,0],[329,.1],[392,.2],[523,.3],[659,.45],[784,.6]].forEach(([f,t]) => {
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='square'; o.frequency.value=f;
          g.gain.setValueAtTime(.15,now+t);
          g.gain.exponentialRampToValueAtTime(.001,now+t+.25);
          o.start(now+t); o.stop(now+t+.25);
        });
      } else if (type === 'click') {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='square'; o.frequency.setValueAtTime(600,now); o.frequency.exponentialRampToValueAtTime(200,now+.06);
        g.gain.setValueAtTime(.12,now); g.gain.exponentialRampToValueAtTime(.001,now+.06);
        o.start(now); o.stop(now+.06);
      } else if (type === 'place') {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='square'; o.frequency.setValueAtTime(250,now); o.frequency.exponentialRampToValueAtTime(500,now+.07);
        g.gain.setValueAtTime(.18,now); g.gain.exponentialRampToValueAtTime(.001,now+.1);
        o.start(now); o.stop(now+.1);
      } else if (type === 'remove') {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='triangle'; o.frequency.setValueAtTime(500,now); o.frequency.exponentialRampToValueAtTime(180,now+.08);
        g.gain.setValueAtTime(.12,now); g.gain.exponentialRampToValueAtTime(.001,now+.08);
        o.start(now); o.stop(now+.08);
      } else if (type === 'success') {
        // マインクラフト実績解除音：「ding + 和音 + 余韻」
        // 低い打撃音
        const kick=ctx.createOscillator(), kg=ctx.createGain();
        kick.connect(kg); kg.connect(ctx.destination);
        kick.type='sine'; kick.frequency.setValueAtTime(120,now); kick.frequency.exponentialRampToValueAtTime(40,now+.15);
        kg.gain.setValueAtTime(.4,now); kg.gain.exponentialRampToValueAtTime(.001,now+.15);
        kick.start(now); kick.stop(now+.15);
        // メロディ：ドミソド（実績解除っぽい）
        [[523,0,.3],[659,.1,.3],[784,.2,.35],[1047,.35,.6],[1319,.55,.7]].forEach(([f,t,dur]) => {
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='triangle'; o.frequency.value=f;
          g.gain.setValueAtTime(.25,now+t);
          g.gain.exponentialRampToValueAtTime(.001,now+t+dur);
          o.start(now+t); o.stop(now+t+dur);
        });
        // 高いキラキラ余韻
        [2093,2637].forEach((f,i) => {
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='sine'; o.frequency.value=f;
          const t=now+.7+i*.1;
          g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.5);
          o.start(t); o.stop(t+.5);
        });
      } else if (type === 'fail') {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type='sawtooth'; o.frequency.setValueAtTime(200,now); o.frequency.exponentialRampToValueAtTime(80,now+.25);
        g.gain.setValueAtTime(.18,now); g.gain.exponentialRampToValueAtTime(.001,now+.25);
        o.start(now); o.stop(now+.25);
      }
    } catch(e) {}
  },

  vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} },

  buildCraftGrid() {
    const g = document.getElementById('craft-grid');
    g.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const slot = document.createElement('div');
      slot.className = 'craft-slot';
      slot.dataset.idx = i;
      const h = e => { e.preventDefault(); this.handleCraftClick(i); };
      slot.addEventListener('click', h);
      slot.addEventListener('touchend', h);
      g.appendChild(slot);
    }
  },

  buildInventory() {
    const g = document.getElementById('inv-grid');
    g.innerHTML = '';
    INVENTORY_KEYS.forEach(key => {
      const slot = document.createElement('div');
      slot.className = 'inv-slot';
      slot.dataset.itemId = key;
      const img = document.createElement('img');
      img.src = items[key].img; img.alt = items[key].name; img.draggable = false;
      img.onerror = () => { img.style.opacity = '.25'; };
      slot.appendChild(img);
      const nm = document.createElement('div');
      nm.className = 'inv-name';
      nm.textContent = items[key].name;
      slot.appendChild(nm);
      const h = e => { e.preventDefault(); this.handleInvClick(key); };
      slot.addEventListener('click', h);
      slot.addEventListener('touchend', h);
      g.appendChild(slot);
    });
    const empty = document.createElement('div');
    empty.className = 'inv-slot';
    empty.style.cssText = 'cursor:default;background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.15)';
    g.appendChild(empty);
  },

  handleInvClick(key) {
    this.playSound('click');
    this.selectedItem = (this.selectedItem === key) ? null : key;
    if (this.selectedItem) this.speak(items[key].yomi || items[key].name);
    this.updateInvHighlight();
  },

  handleCraftClick(idx) {
    if (this.gridState[idx]) {
      this.gridState[idx] = null; this.playSound('remove');
    } else if (this.selectedItem) {
      this.gridState[idx] = this.selectedItem; this.playSound('place');
    } else return;
    this.refreshCraftDisplay(); this.refreshMaterials(); this.refreshResult();
  },

  updateInvHighlight() {
    document.querySelectorAll('.inv-slot').forEach(s => {
      s.classList.toggle('selected', s.dataset.itemId === this.selectedItem);
    });
  },

  refreshCraftDisplay() {
    const slots = document.querySelectorAll('.craft-slot');
    const recipe = this.currentRecipe;
    slots.forEach((slot, i) => {
      slot.querySelectorAll('img').forEach(img => img.remove());
      if (this.hintActive && recipe) {
        const hk = recipe.grid[Math.floor(i/3)][i%3];
        if (hk && !this.gridState[i]) {
          const gh = document.createElement('img');
          gh.className = 'hint-ghost'; gh.src = items[hk].img; gh.draggable = false;
          slot.appendChild(gh);
        }
      }
      if (this.gridState[i]) {
        const img = document.createElement('img');
        img.className = 'placed-item'; img.src = items[this.gridState[i]].img; img.draggable = false;
        img.onerror = () => { img.style.opacity = '.25'; };
        slot.appendChild(img);
      }
    });
  },

  refreshMaterials() {
    const bar = document.getElementById('materials-bar');
    bar.innerHTML = '<span id="mat-label">必要:</span>';
    if (!this.currentRecipe) return;
    const needed = {}, placed = {};
    this.currentRecipe.grid.flat().filter(Boolean).forEach(k => { needed[k] = (needed[k]||0)+1; });
    this.gridState.filter(Boolean).forEach(k => { placed[k] = (placed[k]||0)+1; });
    Object.entries(needed).forEach(([key, total]) => {
      const rem = total - Math.min(placed[key]||0, total);
      const tag = document.createElement('span');
      tag.className = 'mat-tag' + (rem<=0?' done':'');
      const img = document.createElement('img');
      img.src = items[key].img; img.draggable = false;
      img.onerror = () => { img.style.opacity='.25'; };
      tag.appendChild(img);
      tag.appendChild(document.createTextNode(items[key].name + ' ×' + rem));
      bar.appendChild(tag);
    });
  },

  refreshResult() {
    const slot = document.getElementById('result-slot');
    slot.innerHTML = '';
    if (this.checkMatch()) {
      const img = document.createElement('img');
      img.src = items[this.currentRecipe.id].img; img.draggable = false;
      img.onerror = () => { img.style.opacity='.25'; };
      slot.appendChild(img);
    }
  },

  refreshHintInv() {
    if (!this.currentRecipe) return;
    const nk = new Set(this.currentRecipe.grid.flat().filter(Boolean));
    document.querySelectorAll('.inv-slot').forEach(s => {
      s.classList.toggle('hint-glow', this.hintActive && nk.has(s.dataset.itemId));
    });
  },

  normalizePattern(cells) {
    const filled = [];
    cells.forEach((key, i) => {
      if (key) filled.push({key, r: Math.floor(i / 3), c: i % 3});
    });
    if (!filled.length) return [];

    const minR = Math.min(...filled.map(p => p.r));
    const maxR = Math.max(...filled.map(p => p.r));
    const minC = Math.min(...filled.map(p => p.c));
    const maxC = Math.max(...filled.map(p => p.c));
    const pattern = [];

    for (let r = minR; r <= maxR; r++) {
      const row = [];
      for (let c = minC; c <= maxC; c++) {
        row.push(cells[r * 3 + c] || null);
      }
      pattern.push(row);
    }
    return pattern;
  },

  patternsEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let r = 0; r < a.length; r++) {
      if (a[r].length !== b[r].length) return false;
      for (let c = 0; c < a[r].length; c++) {
        if ((a[r][c] || null) !== (b[r][c] || null)) return false;
      }
    }
    return true;
  },

  checkMatch() {
    if (!this.currentRecipe) return false;
    const recipePattern = this.normalizePattern(this.currentRecipe.grid.flat());
    const currentPattern = this.normalizePattern(this.gridState);
    return this.patternsEqual(recipePattern, currentPattern);
  },

  resetGrid() {
    this.playSound('click');
    this.gridState = Array(9).fill(null);
    this.selectedItem = null; this.hintActive = false;
    this.clearStatus(); this.updateInvHighlight();
    this.refreshCraftDisplay(); this.refreshMaterials();
    this.refreshResult(); this.refreshHintInv();
  },

  toggleHint() {
    this.playSound('click');
    this.hintActive = !this.hintActive;
    this.speak(this.hintActive ? 'ヒント！ 正しい場所を見てみよう' : 'ヒントを隠したよ');
    this.refreshCraftDisplay(); this.refreshHintInv();
  },

  checkRecipe() {
    this.playSound('click');
    this.checkMatch() ? this.onSuccess() : this.onFail();
  },

  nextQuestion() {
    document.getElementById('success-modal').classList.remove('show');
    let idx;
    do { idx = Math.floor(Math.random() * recipes.length); }
    while (recipes.length>1 && this.currentRecipe && recipes[idx].id===this.currentRecipe.id);
    this.currentRecipe = recipes[idx];
    this.questionCount++;
    this.gridState = Array(9).fill(null);
    this.selectedItem = null; this.hintActive = false;
    const r = this.currentRecipe;
    document.getElementById('target-img').src = items[r.id].img;
    document.getElementById('target-name').textContent = items[r.id].name;
    document.getElementById('topbar-counter').textContent = this.correctCount+'/'+(this.questionCount-1)+' 正解';
    this.clearStatus(); this.updateInvHighlight();
    this.refreshCraftDisplay(); this.refreshMaterials();
    this.refreshResult(); this.refreshHintInv();
    // タイトル画面が表示中は読み上げしない
    const ts = document.getElementById('title-screen');
    if (!ts || ts.style.display === 'none') {
      this.speak((items[r.id].yomi || items[r.id].name) + ' を つくろう！');
    }
  },

  onSuccess() {
    this.playSound('success');
    this.vibrate([80, 40, 80, 40, 120]);
    this.correctCount++;
    document.getElementById('topbar-counter').textContent = this.correctCount+'/'+this.questionCount+' 正解';
    this.refreshResult();

    const r = this.currentRecipe;
    // 実績バナー更新
    document.getElementById('success-item-img').src = items[r.id].img;
    document.getElementById('achievement-name').textContent = items[r.id].name + ' を クラフト！';
    document.getElementById('success-sub').textContent = items[r.id].name + ' ができました！';

    document.getElementById('success-modal').classList.add('show');

    // 控えめなピクセル欠片演出
    this.spawnPixelParticles();
    this.spawnSideConfetti();

    // チャット欄メッセージ（250ms後に表示）
    setTimeout(() => {
      showChatLine(`<span style="color:#f5d56a">[じっせき] </span><span style="color:#fff">${items[r.id].name} を クラフトした！</span>`);
    }, 600);
    setTimeout(() => {
      const msgs = ['すごい！','やったね！','さすが！','かんぺき！','うまい！'];
      showChatLine(`<span style="color:#55FF55">* ${msgs[Math.floor(Math.random()*msgs.length)]}</span>`);
    }, 1100);

    this.speak((items[r.id].yomi || items[r.id].name) + ' が できた！ すごい！');
    const msg = document.getElementById('status-msg');
    msg.textContent='せいこう！'; msg.className='success';
  },

  onFail() {
    this.playSound('fail'); this.vibrate(200);
    const fr = document.getElementById('craft-center');
    fr.classList.remove('shake-anim'); void fr.offsetWidth; fr.classList.add('shake-anim');
    const msg = document.getElementById('status-msg');
    msg.textContent='もう一度 調べてみよう！'; msg.className='fail';
    this.speak('もう一度 調べてみよう');
    showChatLine('<span style="color:#FF5555">もう一度 チャレンジ！</span>', 2500);
  },

  clearStatus() {
    const msg = document.getElementById('status-msg');
    msg.textContent=''; msg.className='';
  },

  // ブロック破壊エフェクト：四角いピクセル欠片が飛び散る
  spawnPixelParticles() {
    const c = document.getElementById('particles-container');
    c.innerHTML = '';
    const cx = window.innerWidth/2, cy = window.innerHeight * 0.46;
    // ブロック色（マインクラフトのブロック破壊色）
    const blockColors = [
      '#f5d56a','#d39a2f',
      '#7acc5a','#5aaa2a',
      '#ffffff','#cfcfcf',
    ];
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'px-particle';
      const sz = 5 + Math.random() * 8;
      p.style.width = sz + 'px';
      p.style.height = sz + 'px';
      p.style.background = blockColors[Math.floor(Math.random() * blockColors.length)];
      p.style.borderRadius = Math.random() > 0.7 ? '2px' : '0';
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      const angle = Math.random() * Math.PI * 2;
      const dist = 50 + Math.random() * 130;
      p.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
      p.style.setProperty('--dy', (Math.sin(angle)*dist - 60) + 'px');
      p.style.setProperty('--rot', (Math.random()*720 - 360) + 'deg');
      p.style.setProperty('--dur', (.6 + Math.random()*.8) + 's');
      p.style.setProperty('--delay', (Math.random()*.25) + 's');
      c.appendChild(p);
    }
    setTimeout(() => { c.innerHTML = ''; }, 2000);
  },

  // クラッカーのように左右から紙吹雪が出る演出
  spawnSideConfetti() {
    const c = document.getElementById('particles-container');
    const colors = ['#f5d56a','#7acc5a','#8bd0ff','#ffffff','#d39a2f','#ff8f70'];
    const origins = [
      { side: 'left', x: -12, dir: 1 },
      { side: 'right', x: window.innerWidth + 12, dir: -1 },
    ];
    origins.forEach(origin => {
      const baseY = window.innerHeight * 0.52;
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        const w = 6 + Math.random() * 12;
        const h = 4 + Math.random() * 8;
        const burst = 120 + Math.random() * 220;
        const rise = -130 + Math.random() * 110;
        const fall = 50 + Math.random() * 190;
        p.style.left = origin.x + 'px';
        p.style.top = (baseY + (Math.random() * 90 - 45)) + 'px';
        p.style.setProperty('--w', w + 'px');
        p.style.setProperty('--h', h + 'px');
        p.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
        p.style.setProperty('--mid-x', (origin.dir * burst) + 'px');
        p.style.setProperty('--mid-y', rise + 'px');
        p.style.setProperty('--end-x', (origin.dir * (burst + 40 + Math.random() * 120)) + 'px');
        p.style.setProperty('--end-y', (rise + fall) + 'px');
        p.style.setProperty('--rot-mid', (origin.dir * (160 + Math.random() * 260)) + 'deg');
        p.style.setProperty('--rot-end', (origin.dir * (420 + Math.random() * 540)) + 'deg');
        p.style.setProperty('--dur', (1.05 + Math.random() * .65) + 's');
        p.style.setProperty('--delay', (Math.random() * .18) + 's');
        c.appendChild(p);
      }
    });
  },

};

window.addEventListener('DOMContentLoaded', () => game.init());
</script>
</body>
</html>
