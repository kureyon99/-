<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- iOS Webアプリ対応 (iPadOS 26以降の「Webアプリとして開く」でフルスクリーン動作) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>マイクラ クラフトクイズ</title>
<style>
/* =====================================================
   CSS変数 — window.innerHeightをJSで --avh に設定して使う
   これによりiOS Safariのアドレスバー分の誤差を解消
   ===================================================== */
:root {
  --avh: 100px; /* JSで上書きされる */
  --mc-bg: #c6c6c6;
  --mc-dark: #373737;
  --mc-slot: #8b8b8b;
  --mc-tl: #373737;
  --mc-br: #ffffff;
  --mc-ptl: #ffffff;
  --mc-pbr: #555555;
  --mc-text: #404040;
  --mc-green: #5a9e4a;
  --mc-gl: #7acc5a;
  --mc-gd: #3d7a2a;
  --mc-sel: #6e9fd8;
  --mc-sel-tl: #4a78b0;
  --mc-sel-br: #a8d4ff;
  /* 固定バーの高さ定数 */
  --topbar-h: 32px;
  --bottom-h: 60px;
}

*,*::before,*::after {
  box-sizing: border-box; margin: 0; padding: 0;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

html {
  /* iOS Safariの100vh問題を回避: html自体は固定しない */
  height: 100%;
}

body {
  width: 100%;
  /* window.innerHeightをCSSカスタムプロパティで使う */
  height: calc(var(--avh) * 1px);
  overflow: hidden;
  background: #1a1a1a;
  font-family: "Courier New","Monaco","Hiragino Kaku Gothic ProN","Meiryo",monospace;
  color: var(--mc-text);
}

#app {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--mc-bg);
  overflow: hidden;
  position: relative;
}

/* =====================================================
   共通パーツ
   ===================================================== */
/* MCスタイルボーダー（左上が明るく、右下が暗い = 出っ張り感） */
.mc-raised {
  border: 3px solid;
  border-color: var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
}
/* MCスタイルボーダー（スロット内側 = 凹み感） */
.mc-inset {
  border: 3px solid;
  border-color: var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
}

/* =====================================================
   TOP BAR
   ===================================================== */
#topbar {
  height: var(--topbar-h);
  min-height: var(--topbar-h);
  flex-shrink: 0;
  background: #484848;
  border-bottom: 3px solid var(--mc-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 0 12px;
}
#topbar-title { color:#fff; font-size:13px; font-weight:bold; text-shadow:2px 2px 0 #000; letter-spacing:1px; }
#topbar-counter { color:#aaa; font-size:10px; text-shadow:1px 1px 0 #000; }

/* =====================================================
   MAIN AREA (flex:1, contains everything except bars)
   ===================================================== */
#main {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

/* =====================================================
   BOTTOM BAR — 3 colored buttons
   ===================================================== */
#bottom-bar {
  height: var(--bottom-h);
  min-height: var(--bottom-h);
  flex-shrink: 0;
  border-top: 3px solid var(--mc-dark);
  background: #707070;
  display: flex;
  align-items: stretch;
  padding: 6px 8px;
  gap: 8px;
}
.mc-btn {
  font-family: inherit;
  font-weight: bold;
  color: #fff;
  background: #6e6e6e;
  border: 3px solid;
  border-color: #aaa var(--mc-dark) var(--mc-dark) #aaa;
  cursor: pointer;
  text-shadow: 2px 2px 0 #000;
  white-space: nowrap;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  line-height: 1;
  transition: filter .05s;
  -webkit-appearance: none;
}
.mc-btn:active { border-color: var(--mc-dark) #aaa #aaa var(--mc-dark); filter: brightness(.88); }
.mc-btn.sub {
  flex: 1; padding: 0;
  font-size: clamp(15px, 2vw, 22px);
  min-height: 0;
}
.mc-btn.reset-btn { background:#3a7fc1; border-color:#6db0f0 #1a4f8a #1a4f8a #6db0f0; }
.mc-btn.reset-btn:active { border-color:#1a4f8a #6db0f0 #6db0f0 #1a4f8a; }
.mc-btn.hint-btn  { background:#c87820; border-color:#f0aa50 #8a4a08 #8a4a08 #f0aa50; }
.mc-btn.hint-btn:active  { border-color:#8a4a08 #f0aa50 #f0aa50 #8a4a08; }
.mc-btn.next-btn  { background:#7a3ab8; border-color:#aa70e8 #4a1878 #4a1878 #aa70e8; }
.mc-btn.next-btn:active  { border-color:#4a1878 #aa70e8 #aa70e8 #4a1878; }
.mc-btn.green { background:var(--mc-green); border-color:var(--mc-gl) var(--mc-gd) var(--mc-gd) var(--mc-gl); }
.mc-btn.green:active { border-color:var(--mc-gd) var(--mc-gl) var(--mc-gl) var(--mc-gd); }

/* =====================================================
   作る！ボタン
   ===================================================== */
.mc-btn.craft-main {
  background: var(--mc-green);
  border-color: var(--mc-gl) var(--mc-gd) var(--mc-gd) var(--mc-gl);
  border-width: 4px;
  font-size: clamp(18px, 3vw, 28px);
  letter-spacing: 2px;
  padding: 0;
  width: 82%;
  max-width: 520px;
  box-shadow: 0 4px 14px rgba(0,0,0,.4);
}
.mc-btn.craft-main:active { border-color:var(--mc-gd) var(--mc-gl) var(--mc-gl) var(--mc-gd); }

/* =====================================================
   CRAFT slots & INV slots — 共通スタイル
   ===================================================== */
.craft-slot {
  background: var(--mc-slot);
  border: 3px solid;
  border-color: var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  transition: background .08s;
  /* サイズは各レイアウトで上書き */
}
.craft-slot:active { border-color: var(--mc-br) var(--mc-tl) var(--mc-tl) var(--mc-br); background:#888; }
.craft-slot img.placed-item {
  width:74%; height:74%;
  object-fit:contain; image-rendering:pixelated;
  position:relative; z-index:3;
  filter: drop-shadow(1px 1px 2px rgba(0,0,0,.4));
}
.craft-slot img.hint-ghost {
  position:absolute; width:66%; height:66%;
  object-fit:contain; image-rendering:pixelated;
  opacity:.3; z-index:1; pointer-events:none; filter:brightness(1.3);
}

.inv-slot {
  background: var(--mc-slot);
  border: 3px solid;
  border-color: var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  cursor: pointer; position: relative;
  transition: background .1s;
  overflow: hidden;
  min-height: 0; min-width: 0;
  gap: 2px; padding: 4px 3px 5px;
}
.inv-slot:active { border-color: var(--mc-br) var(--mc-tl) var(--mc-tl) var(--mc-br); background:#888; }
.inv-slot img {
  width:54%; height:auto; max-height:54%;
  object-fit:contain; image-rendering:pixelated; flex-shrink:0;
  filter: drop-shadow(1px 1px 1px rgba(0,0,0,.35));
}
.inv-slot .inv-name {
  font-size: clamp(8px, 1.1vw, 13px);
  font-weight: bold; color:#fff; text-shadow:1px 1px 0 #000;
  text-align:center; line-height:1.2;
  word-break:keep-all; overflow:hidden; width:100%; padding:0 2px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  flex-shrink:0;
}
.inv-slot.selected { background:var(--mc-sel); border-color:var(--mc-sel-tl) var(--mc-sel-br) var(--mc-sel-br) var(--mc-sel-tl); }
.inv-slot.hint-glow { animation: invGlow .6s ease-in-out infinite alternate; }
@keyframes invGlow {
  from { background:var(--mc-slot); box-shadow:none; }
  to   { background:#f0d050; box-shadow:inset 0 0 12px rgba(255,215,0,.7); }
}

/* 素材タグ */
.mat-tag {
  display:inline-flex; align-items:center; gap:5px;
  padding: 4px 8px;
  background: var(--mc-bg);
  border:2px solid; border-color:var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
  white-space:nowrap; font-weight:bold; transition:all .3s;
}
.mat-tag img { image-rendering:pixelated; object-fit:contain; }
.mat-tag.done { color:var(--mc-gd); background:#b6e8a0; border-color:#7acc5a #3d7a2a #3d7a2a #7acc5a; }

/* 矢印ボックス */
#arrow-icon {
  width:34px; height:34px;
  background:var(--mc-bg);
  border:2px solid; border-color:var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:var(--mc-text); flex-shrink:0;
}

/* ステータスメッセージ */
#status-msg { font-weight:bold; color:transparent; text-align:center; transition:color .3s; flex-shrink:0; }
#status-msg.fail    { color:#ff4444; text-shadow:1px 1px 0 #800; }
#status-msg.success { color:var(--mc-green); text-shadow:1px 1px 0 #2a5a1a; }

/* 結果スロット */
#result-slot {
  background:var(--mc-slot);
  border:3px solid; border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
#result-slot img { width:74%; height:74%; object-fit:contain; image-rendering:pixelated; filter:drop-shadow(1px 1px 2px rgba(0,0,0,.4)); }

/* ターゲットスロット */
#target-slot {
  background:var(--mc-slot);
  border:3px solid; border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
#target-slot img { width:82%; height:82%; object-fit:contain; image-rendering:pixelated; }

/* =====================================================
   SUCCESS MODAL
   ===================================================== */
#success-modal {
  position: fixed;
  top:0; left:0; right:0; bottom:0; /* inset:0 の代替 — iOS 14以下互換 */
  background: rgba(0,0,0,.88);
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  z-index: 300;
}
#success-modal.show { display:flex; }
#success-item-img {
  width:160px; height:160px; object-fit:contain; image-rendering:pixelated;
  animation: successSpin .6s cubic-bezier(.175,.885,.32,1.275) forwards;
  filter: drop-shadow(0 0 28px rgba(255,215,0,.7));
}
#success-text { color:#FFD700; font-size:clamp(22px,5vw,40px); font-weight:bold; margin-top:14px; text-shadow:3px 3px 0 #000; animation:pulse 1s ease-in-out infinite; }
#success-sub  { color:#fff; font-size:clamp(12px,2vw,18px); margin-top:8px; text-shadow:2px 2px 0 #000; }
#success-modal .mc-btn { margin-top:20px; font-size:16px; padding:12px 24px; }

/* アニメーション */
@keyframes successSpin { 0%{transform:scale(0) rotate(-180deg);opacity:0} 100%{transform:scale(1) rotate(0deg);opacity:1} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes shake { 0%,100%{transform:none} 10%,50%,90%{transform:translateX(-6px)} 30%,70%{transform:translateX(6px)} }
.shake-anim { animation:shake .4s cubic-bezier(.36,.07,.19,.97); }

#particles-container { position:fixed; top:0;left:0;right:0;bottom:0; pointer-events:none; z-index:310; }
.particle { position:absolute; animation:particleFly 1.3s ease-out forwards; }
@keyframes particleFly { 0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)} 100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2) rotate(360deg)} }

/* =====================================================
   LANDSCAPE レイアウト（横画面）
   左エリア（ターゲット＋素材＋作業台＋作る！）＋右エリア（インベントリ）
   ===================================================== */
@media (orientation: landscape) {

  :root {
    --bottom-h: 74px;   /* リセット・ヒント・次へ ボタンを厚く */
  }

  #main { flex-direction: row; }

  /* ---- 左エリア ---- */
  #left-area {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden; min-width: 0;
  }

  /* ターゲット帯 */
  #target-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px;
    border-bottom: 3px solid var(--mc-dark);
    background: #b8b8b8;
    flex-shrink: 0;
  }
  #target-slot { width: 100px; height: 100px; }
  #target-info { display:flex; flex-direction:column; gap:3px; }
  #target-label { font-size: clamp(10px,1.3vw,14px); font-weight:bold; color:var(--mc-text); text-shadow:1px 1px 0 #fff; }
  #target-name  { font-size: clamp(15px,2vw,22px); font-weight:bold; color:#222; text-shadow:1px 1px 0 #fff; }

  /* 素材バー */
  #materials-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 5px;
    padding: 5px 12px;
    border-bottom: 3px solid var(--mc-dark);
    background: #adadad;
    flex-shrink: 0; min-height: 40px;
  }
  #mat-label { font-size: clamp(10px,1.2vw,13px); font-weight:bold; color:var(--mc-text); text-shadow:1px 1px 0 #fff; margin-right:2px; white-space:nowrap; }
  .mat-tag { font-size: clamp(11px,1.5vw,16px); }
  .mat-tag img { width:20px; height:20px; }

  /* 作業台エリア */
  #craft-center {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5px; padding: 6px;
    min-height: 0;
  }
  #craft-row { display:flex; align-items:center; gap:10px; }
  #craft-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr);
    gap: 3px; background: var(--mc-slot);
    padding: 3px; border: 3px solid var(--mc-dark);
  }

  /*
    craft-slotのサイズをJSで計算した --slot-size で決める
    フォールバックとして clamp も指定
  */
  .craft-slot {
    width:  var(--slot-size, clamp(72px, 12vw, 120px));
    height: var(--slot-size, clamp(72px, 12vw, 120px));
  }
  #result-slot {
    width:  var(--slot-size, clamp(72px, 12vw, 120px));
    height: var(--slot-size, clamp(72px, 12vw, 120px));
  }
  #arrow-area { display:flex; flex-direction:column; align-items:center; gap:6px; }

  #status-msg { font-size: clamp(10px,1.3vw,14px); min-height:18px; }

  /* 作る！ボタン行 — 横画面でも厚く */
  #craft-btn-row {
    display: flex; align-items: center; justify-content: center;
    padding: 8px 14px;
    border-top: 3px solid var(--mc-dark);
    background: #9a9a9a;
    flex-shrink: 0;
    min-height: 66px;
  }
  .mc-btn.craft-main {
    font-size: clamp(18px,2.5vw,28px);
    min-height: 52px;
    width: 82%;
  }

  /* ---- 右エリア（インベントリ） ---- */
  #right-panel {
    width: clamp(230px, 28%, 320px);
    border-left: 3px solid var(--mc-dark);
    display: flex; flex-direction: column;
    background: var(--mc-bg); overflow: hidden; flex-shrink: 0;
  }
  #inv-header {
    background: #484848; border-bottom: 2px solid var(--mc-dark);
    padding: 5px; text-align: center; flex-shrink: 0;
  }
  #inv-header-text { color:#fff; font-size:clamp(11px,1.3vw,14px); font-weight:bold; text-shadow:2px 2px 0 #000; letter-spacing:1px; }
  #inv-grid {
    flex:1; display:grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 4px; padding: 5px;
    overflow: hidden;
  }
  .inv-slot .inv-name { font-size: clamp(8px, 1vw, 12px); }

  /* 縦画面用要素を隠す */
  #portrait-only { display: none !important; }
}

/* =====================================================
   PORTRAIT レイアウト（縦画面）
   上段：ターゲット＋素材＋作業台＋作る！
   下段：インベントリ（大きく）
   ===================================================== */
@media (orientation: portrait) {

  :root {
    --bottom-h: 74px;   /* リセット・ヒント・次へ ボタンを厚く */
  }

  #main { flex-direction: column; }

  /* ---- 上段：ターゲット＋素材＋作業台 ---- */
  #left-area {
    /* 画面全体の上55%を上段に使う */
    flex: 0 0 55%;
    display: flex; flex-direction: column;
    overflow: hidden; min-width: 0; min-height: 0;
  }

  /* ターゲット帯 */
  #target-strip {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px;
    border-bottom: 3px solid var(--mc-dark);
    background: #b8b8b8;
    flex-shrink: 0;
  }
  #target-slot { width: 72px; height: 72px; }
  #target-info { display:flex; flex-direction:column; gap:2px; }
  #target-label { font-size: 11px; font-weight:bold; color:var(--mc-text); text-shadow:1px 1px 0 #fff; }
  #target-name  { font-size: clamp(14px,3.5vw,22px); font-weight:bold; color:#222; text-shadow:1px 1px 0 #fff; }

  /* 素材バー */
  #materials-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
    padding: 4px 10px;
    border-bottom: 3px solid var(--mc-dark);
    background: #adadad;
    flex-shrink: 0; min-height: 38px;
  }
  #mat-label { font-size: 11px; font-weight:bold; color:var(--mc-text); text-shadow:1px 1px 0 #fff; margin-right:2px; white-space:nowrap; }
  .mat-tag { font-size: clamp(11px,2.8vw,15px); }
  .mat-tag img { width:18px; height:18px; }

  /* 作業台エリア — flex:1 で残りを使う */
  #craft-center {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px; padding: 4px;
    min-height: 0;
  }
  #craft-row { display:flex; align-items:center; gap:8px; }
  #craft-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(3,1fr);
    gap: 3px; background: var(--mc-slot);
    padding: 3px; border: 3px solid var(--mc-dark);
  }
  .craft-slot {
    width:  var(--slot-size-p, clamp(60px, 17vw, 110px));
    height: var(--slot-size-p, clamp(60px, 17vw, 110px));
  }
  #result-slot {
    width:  var(--slot-size-p, clamp(60px, 17vw, 110px));
    height: var(--slot-size-p, clamp(60px, 17vw, 110px));
  }
  #arrow-area { display:flex; flex-direction:column; align-items:center; gap:4px; }
  #arrow-icon { width:30px; height:30px; font-size:16px; }

  #status-msg { font-size: 12px; min-height:16px; }

  /* 作る！ボタン行 — 縦画面でも厚く */
  #craft-btn-row {
    display: flex; align-items: center; justify-content: center;
    padding: 8px 10px;
    border-top: 3px solid var(--mc-dark);
    background: #9a9a9a;
    flex-shrink: 0;
    min-height: 62px;
  }
  .mc-btn.craft-main {
    font-size: clamp(18px,4.5vw,26px);
    min-height: 48px;
    width: 85%;
  }

  /* ---- 下段：インベントリ（画面の残り45%） ---- */
  #right-panel {
    flex: 0 0 45%;          /* 残り45%をインベントリに充てる */
    width: 100%;
    border-left: none;
    border-top: 3px solid var(--mc-dark);
    display: flex; flex-direction: column;
    background: var(--mc-bg); overflow: hidden; flex-shrink: 0;
  }
  #inv-header {
    background: #484848; border-bottom: 2px solid var(--mc-dark);
    padding: 5px; text-align: center; flex-shrink: 0;
  }
  #inv-header-text { color:#fff; font-size:12px; font-weight:bold; text-shadow:2px 2px 0 #000; letter-spacing:1px; }
  /* 縦画面：3列4行（12スロット）— 横幅が広いので3列でも大きく表示 */
  #inv-grid {
    flex:1; display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 5px; padding: 6px;
    overflow: hidden;
  }
  .inv-slot .inv-name { font-size: clamp(9px, 2.2vw, 13px); }

  /* 横画面用要素は縦でも表示 */
  #portrait-only { display: none !important; }
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span id="topbar-title">⛏ マイクラ クラフトクイズ</span>
    <span id="topbar-counter"></span>
  </div>

  <div id="main">
    <div id="left-area">
      <div id="target-strip">
        <div id="target-slot"><img id="target-img" src="" alt="" onerror="this.style.opacity='.3'"></div>
        <div id="target-info">
          <div id="target-label">これを作ろう！</div>
          <div id="target-name"></div>
        </div>
      </div>
      <div id="materials-bar"><span id="mat-label">必要:</span></div>
      <div id="craft-center">
        <div id="craft-row">

// iOS Safari 100vh バグ修正 + craft-slot サイズ動的計算
// =====================================================
function setLayout() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const root = document.documentElement;

  // --avh: window.innerHeightの実際の値をpx単位でCSSに渡す
  root.style.setProperty('--avh', H);

  const isLandscape = W > H;

  if (isLandscape) {
    // ---- 横画面 ----
    // 固定バー: topbar(32) + target-strip(118) + materials-bar(40) + craft-btn-row(66) + bottom-bar(74)
    const topbarH    = 32;
    const targetH    = 100 + 6*2 + 3*2;  // 画像100 + padding上下6 + border3
    const materialsH = 40;
    const craftBtnH  = 66;
    const bottomH    = 74;
    const craftCenterH = H - topbarH - targetH - materialsH - craftBtnH - bottomH;
    // craft-row内: gap(5*2) + padding(6*2) + status(18) + gap(5)
    const available = craftCenterH - 22 - 18 - 5;
    const slotSize = Math.floor(Math.max(60, Math.min(available / 3, 150)));
    root.style.setProperty('--slot-size', slotSize + 'px');

  } else {
    // ---- 縦画面 ----
    // left-area は全体の55%、そこからの固定部:
    // topbar(32) + target-strip(88) + materials-bar(38) + craft-btn-row(62) + bottom-bar(74)
    const topbarH    = 32;
    const bottomH    = 74;
    const leftAreaH  = (H - topbarH - bottomH) * 0.55;  // flex:0 0 55% of #main
    const targetH    = 72 + 5*2 + 3*2;   // 画像72 + padding5 + border3
    const materialsH = 38;
    const craftBtnH  = 62;
    const craftCenterH = leftAreaH - targetH - materialsH - craftBtnH;
    // craft-row内余白を引く
    const available = craftCenterH - 16 - 8 - 4;
    const slotSizeByH = Math.floor(Math.max(55, Math.min(available / 3, 120)));
    // 幅からも制約: 3スロット + 矢印エリア(30+8+スロット) が横幅に収まるように
    // craft-gridの横: slot*3 + gap*2 + padding*2 + border*2 = slot*3 + 16
    // arrow-area: gap(8) + arrow(30) + gap(4) + result(slot) = slot + 42
    // 合計: slot*4 + 58 <= W * 0.85 (余裕をもたせる)
    const slotSizeByW = Math.floor(Math.max(55, Math.min((W * 0.85 - 58) / 4, 120)));
    const slotSize = Math.min(slotSizeByH, slotSizeByW);
    root.style.setProperty('--slot-size-p', slotSize + 'px');
  }
}

// 初回 + リサイズ + 向き変更時に再計算
window.addEventListener('resize', setLayout);
window.addEventListener('orientationchange', () => { setTimeout(setLayout, 120); });

const game = {
  currentRecipe:null, gridState:Array(9).fill(null),
  selectedItem:null, hintActive:false,
  audioCtx:null, voices:[], questionCount:0, correctCount:0,

  init() {
    this.buildCraftGrid();
    this.buildInventory();
    document.getElementById('btn-reset').addEventListener('click', () => this.resetGrid());
    document.getElementById('btn-hint').addEventListener('click',  () => this.toggleHint());
    document.getElementById('btn-craft').addEventListener('click', () => this.checkRecipe());
    document.getElementById('btn-next').addEventListener('click',  () => this.nextQuestion());
    document.getElementById('btn-more').addEventListener('click',  () => this.nextQuestion());

    const initAudio = () => {
      if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    };
    document.addEventListener('touchstart', initAudio, {once:true});
    document.addEventListener('click', initAudio, {once:true});

    if (window.speechSynthesis) {
      this.voices = speechSynthesis.getVoices();
      speechSynthesis.onvoiceschanged = () => { this.voices = speechSynthesis.getVoices(); };
    }

    // レイアウト再計算（DOM確定後）
    setLayout();
    this.nextQuestion();
  },

  speak(text) {
    try {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang='ja-JP'; u.rate=0.9; u.pitch=1.05;
      const v = this.voices.find(v => v.lang && v.lang.includes('ja'));
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch(e) {}
  },

  playSound(type) {
    if (!this.audioCtx) return;
    try {
      const ctx = this.audioCtx, now = ctx.currentTime;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type==='click') {
        osc.type='square'; osc.frequency.setValueAtTime(600,now); osc.frequency.exponentialRampToValueAtTime(200,now+.06);
        gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.001,now+.06);
        osc.start(now); osc.stop(now+.06);
      } else if (type==='place') {
        osc.type='square'; osc.frequency.setValueAtTime(250,now); osc.frequency.exponentialRampToValueAtTime(500,now+.07);
        gain.gain.setValueAtTime(.18,now); gain.gain.exponentialRampToValueAtTime(.001,now+.1);
        osc.start(now); osc.stop(now+.1);
      } else if (type==='remove') {
        osc.type='triangle'; osc.frequency.setValueAtTime(500,now); osc.frequency.exponentialRampToValueAtTime(180,now+.08);
        gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.001,now+.08);
        osc.start(now); osc.stop(now+.08);
      } else if (type==='success') {
        osc.disconnect(); gain.disconnect();
        [523,659,784,1047].forEach((f,i) => {
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='triangle'; o.frequency.value=f;
          const t=now+i*.12;
          g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.35);
          o.start(t); o.stop(t+.35);
        });
      } else if (type==='fail') {
        osc.type='sawtooth'; osc.frequency.setValueAtTime(200,now); osc.frequency.exponentialRampToValueAtTime(80,now+.25);
        gain.gain.setValueAtTime(.18,now); gain.gain.exponentialRampToValueAtTime(.001,now+.25);
        osc.start(now); osc.stop(now+.25);
      }
    } catch(e) {}
  },

  vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} },

  buildCraftGrid() {
    const g = document.getElementById('craft-grid');
    g.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const slot = document.createElement('div');
      slot.className = 'craft-slot';
      slot.dataset.idx = i;
      const h = e => { e.preventDefault(); this.handleCraftClick(i); };
      slot.addEventListener('click', h);
      slot.addEventListener('touchend', h);
      g.appendChild(slot);
    }
  },

  buildInventory() {
    const g = document.getElementById('inv-grid');
    g.innerHTML = '';
    INVENTORY_KEYS.forEach(key => {
      const slot = document.createElement('div');
      slot.className = 'inv-slot';
      slot.dataset.itemId = key;
      const img = document.createElement('img');
      img.src = items[key].img; img.alt = items[key].name; img.draggable = false;
      img.onerror = () => { img.style.opacity = '.25'; };
      slot.appendChild(img);
      const nm = document.createElement('div');
      nm.className = 'inv-name';
      nm.textContent = items[key].name;
      slot.appendChild(nm);
      const h = e => { e.preventDefault(); this.handleInvClick(key); };
      slot.addEventListener('click', h);
      slot.addEventListener('touchend', h);
      g.appendChild(slot);
    });
    // 12マス目を空スロットで埋める（2列×6行 or 4列×3行）
    const empty = document.createElement('div');
    empty.className = 'inv-slot';
    empty.style.cssText = 'cursor:default;background:rgba(0,0,0,.08);border-color:rgba(0,0,0,.15)';
    g.appendChild(empty);
  },

  handleInvClick(key) {
    this.playSound('click');
    this.selectedItem = (this.selectedItem === key) ? null : key;
    if (this.selectedItem) this.speak(items[key].name);
    this.updateInvHighlight();
  },

  handleCraftClick(idx) {
    if (this.gridState[idx]) {
      this.gridState[idx] = null; this.playSound('remove');
    } else if (this.selectedItem) {
      this.gridState[idx] = this.selectedItem; this.playSound('place');
    } else return;
    this.refreshCraftDisplay(); this.refreshMaterials(); this.refreshResult();
  },

  updateInvHighlight() {
    document.querySelectorAll('.inv-slot').forEach(s => {
      s.classList.toggle('selected', s.dataset.itemId === this.selectedItem);
    });
  },

  refreshCraftDisplay() {
    const slots = document.querySelectorAll('.craft-slot');
    const recipe = this.currentRecipe;
    slots.forEach((slot, i) => {
      slot.querySelectorAll('img').forEach(img => img.remove());
      if (this.hintActive && recipe) {
        const hk = recipe.grid[Math.floor(i/3)][i%3];
        if (hk && !this.gridState[i]) {
          const gh = document.createElement('img');
          gh.className = 'hint-ghost'; gh.src = items[hk].img; gh.draggable = false;
          slot.appendChild(gh);
        }
      }
      if (this.gridState[i]) {
        const img = document.createElement('img');
        img.className = 'placed-item'; img.src = items[this.gridState[i]].img; img.draggable = false;
        img.onerror = () => { img.style.opacity = '.25'; };
        slot.appendChild(img);
      }
    });
  },

  refreshMaterials() {
    const bar = document.getElementById('materials-bar');
    bar.innerHTML = '<span id="mat-label">必要:</span>';
    if (!this.currentRecipe) return;
    const needed = {}, placed = {};
    this.currentRecipe.grid.flat().filter(Boolean).forEach(k => { needed[k] = (needed[k]||0)+1; });
    this.gridState.filter(Boolean).forEach(k => { placed[k] = (placed[k]||0)+1; });
    Object.entries(needed).forEach(([key, total]) => {
      const rem = total - Math.min(placed[key]||0, total);
      const tag = document.createElement('span');
      tag.className = 'mat-tag' + (rem<=0?' done':'');
      const img = document.createElement('img');
      img.src = items[key].img; img.draggable = false;
      img.onerror = () => { img.style.opacity='.25'; };
      tag.appendChild(img);
      tag.appendChild(document.createTextNode(items[key].name + ' ×' + rem));
      bar.appendChild(tag);
    });
  },

  refreshResult() {
    const slot = document.getElementById('result-slot');
    slot.innerHTML = '';
    if (this.checkMatch()) {
      const img = document.createElement('img');
      img.src = items[this.currentRecipe.id].img; img.draggable = false;
      img.onerror = () => { img.style.opacity='.25'; };
      slot.appendChild(img);
    }
  },

  refreshHintInv() {
    if (!this.currentRecipe) return;
    const nk = new Set(this.currentRecipe.grid.flat().filter(Boolean));
    document.querySelectorAll('.inv-slot').forEach(s => {
      s.classList.toggle('hint-glow', this.hintActive && nk.has(s.dataset.itemId));
    });
  },

  checkMatch() {
    if (!this.currentRecipe) return false;
    for (let r=0;r<3;r++) for (let c=0;c<3;c++)
      if ((this.currentRecipe.grid[r][c]||null) !== (this.gridState[r*3+c]||null)) return false;
    return true;
  },

  resetGrid() {
    this.playSound('click');
    this.gridState = Array(9).fill(null);
    this.selectedItem = null; this.hintActive = false;
    this.clearStatus(); this.updateInvHighlight();
    this.refreshCraftDisplay(); this.refreshMaterials();
    this.refreshResult(); this.refreshHintInv();
  },

  toggleHint() {
    this.playSound('click');
    this.hintActive = !this.hintActive;
    this.speak(this.hintActive ? 'ヒント！ 正しい場所を見てみよう' : 'ヒントを隠したよ');
    this.refreshCraftDisplay(); this.refreshHintInv();
  },

  checkRecipe() {
    this.playSound('click');
    this.checkMatch() ? this.onSuccess() : this.onFail();
  },

  nextQuestion() {
    document.getElementById('success-modal').classList.remove('show');
    let idx;
    do { idx = Math.floor(Math.random() * recipes.length); }
    while (recipes.length>1 && this.currentRecipe && recipes[idx].id===this.currentRecipe.id);
    this.currentRecipe = recipes[idx];
    this.questionCount++;
    this.gridState = Array(9).fill(null);
    this.selectedItem = null; this.hintActive = false;
    const r = this.currentRecipe;
    document.getElementById('target-img').src = items[r.id].img;
    document.getElementById('target-name').textContent = items[r.id].name;
    document.getElementById('topbar-counter').textContent = this.correctCount+'/'+(this.questionCount-1)+' 正解';
    this.clearStatus(); this.updateInvHighlight();
    this.refreshCraftDisplay(); this.refreshMaterials();
    this.refreshResult(); this.refreshHintInv();
    this.speak(items[r.id].name + ' を作ろう！');
  },

  onSuccess() {
    this.playSound('success'); this.vibrate([100,50,100]);
    this.correctCount++;
    document.getElementById('topbar-counter').textContent = this.correctCount+'/'+this.questionCount+' 正解';
    this.refreshResult();
    const r = this.currentRecipe;
    document.getElementById('success-item-img').src = items[r.id].img;
    document.getElementById('success-sub').textContent = items[r.id].name + ' ができました！';
    document.getElementById('success-modal').classList.add('show');
    this.spawnParticles();
    this.speak(items[r.id].name + ' ができた！ すごい！ やったね！');
    const msg = document.getElementById('status-msg');
    msg.textContent='🎉 せいこう！'; msg.className='success';
  },

  onFail() {
    this.playSound('fail'); this.vibrate(200);
    const fr = document.getElementById('craft-center');
    fr.classList.remove('shake-anim'); void fr.offsetWidth; fr.classList.add('shake-anim');
    const msg = document.getElementById('status-msg');
    msg.textContent='❌ もう一度 調べてみよう！'; msg.className='fail';
    this.speak('もう一度 調べてみよう');
  },

  clearStatus() {
    const msg = document.getElementById('status-msg');
    msg.textContent=''; msg.className='';
  },

  spawnParticles() {
    const c = document.getElementById('particles-container');
    c.innerHTML = '';
    const cx=window.innerWidth/2, cy=window.innerHeight/2;
    const colors=['#FFD700','#FFA500','#FFEC00','#FF6B6B','#7FFF00','#00BFFF','#FF69B4','#fff'];
    for (let i=0;i<50;i++) {
      const p=document.createElement('div');
      p.className='particle';
      const a=Math.random()*Math.PI*2, d=80+Math.random()*220;
      p.style.left=cx+'px'; p.style.top=cy+'px';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      const sz=7+Math.random()*11;
      p.style.width=sz+'px'; p.style.height=sz+'px';
      p.style.setProperty('--dx',(Math.cos(a)*d)+'px');
      p.style.setProperty('--dy',(Math.sin(a)*d-60)+'px');
      p.style.animationDelay=(Math.random()*.3)+'s';
      c.appendChild(p);
    }
    setTimeout(()=>{c.innerHTML='';},1900);
  },
};

window.addEventListener('DOMContentLoaded', () => game.init());
</script>
</body>
</html>
