<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>マイクラ クラフトクイズ</title>
<style>
:root {
  --mc-bg: #c6c6c6;
  --mc-darker: #373737;
  --mc-slot: #8b8b8b;
  --mc-tl: #373737;
  --mc-br: #ffffff;
  --mc-ptl: #ffffff;
  --mc-pbr: #555555;
  --mc-text: #404040;
  --mc-green: #5a9e4a;
  --mc-gl: #7acc5a;
  --mc-gd: #3d7a2a;
  --mc-sel-bg: #6e9fd8;
  --mc-sel-tl: #4a78b0;
  --mc-sel-br: #a8d4ff;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{width:100%;height:100%;overflow:hidden;background:#2a2a2a;font-family:"Courier New","Monaco","Hiragino Kaku Gothic ProN","Meiryo",monospace;color:var(--mc-text)}

#app{width:100vw;height:100vh;display:flex;flex-direction:column;background:var(--mc-bg);overflow:hidden;position:relative}

/* TOP BAR */
#topbar{height:30px;min-height:30px;background:#484848;border-bottom:3px solid var(--mc-darker);display:flex;align-items:center;justify-content:center;gap:12px;padding:0 10px;flex-shrink:0}
#topbar-title{color:#fff;font-size:12px;font-weight:bold;text-shadow:2px 2px 0 #000;letter-spacing:1px}
#topbar-counter{color:#aaa;font-size:10px;text-shadow:1px 1px 0 #000}

/* MAIN: left + right */
#main{flex:1;display:flex;min-height:0;overflow:hidden}

/* ===== LEFT AREA ===== */
#left-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Target strip — larger image */
#target-strip{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;
  border-bottom:3px solid var(--mc-darker);
  background:#b8b8b8;
  flex-shrink:0;
}
#target-slot{
  width:90px;height:90px;
  background:var(--mc-slot);
  border:3px solid;
  border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#target-slot img{width:82%;height:82%;object-fit:contain;image-rendering:pixelated}
#target-info{display:flex;flex-direction:column;gap:4px}
#target-label{font-size:clamp(11px,1.4vw,15px);color:var(--mc-text);text-shadow:1px 1px 0 #fff;font-weight:bold}
#target-name{font-size:clamp(16px,2.2vw,24px);font-weight:bold;color:#222;text-shadow:1px 1px 0 #fff}

/* Materials bar above grid */
#materials-bar{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;
  padding:7px 14px;
  border-bottom:3px solid var(--mc-darker);
  background:#adadad;
  flex-shrink:0;min-height:46px;
}
#mat-label{font-size:clamp(11px,1.3vw,14px);font-weight:bold;color:var(--mc-text);text-shadow:1px 1px 0 #fff;margin-right:2px;white-space:nowrap}
.mat-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 9px;
  background:var(--mc-bg);
  border:2px solid;border-color:var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
  white-space:nowrap;
  font-size:clamp(13px,1.8vw,19px);font-weight:bold;
  transition:all .3s;
}
.mat-tag img{width:24px;height:24px;image-rendering:pixelated;object-fit:contain}
.mat-tag.done{color:var(--mc-gd);background:#b6e8a0;border-color:#7acc5a #3d7a2a #3d7a2a #7acc5a}

/* Craft center */
#craft-center{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:6px;padding:8px;min-height:0;
}
#craft-row{display:flex;align-items:center;gap:12px}
#craft-grid{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:3px;background:var(--mc-slot);padding:3px;
  border:3px solid var(--mc-darker);
}

/* Large craft slots */
.craft-slot{
  width:clamp(110px,17vw,165px);
  height:clamp(110px,17vw,165px);
  background:var(--mc-slot);
  border:3px solid;border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:background .08s;
}
.craft-slot:hover{background:#9a9a9a}
.craft-slot:active{border-color:var(--mc-br) var(--mc-tl) var(--mc-tl) var(--mc-br);background:#888}
.craft-slot img.placed-item{
  width:75%;height:75%;object-fit:contain;image-rendering:pixelated;
  position:relative;z-index:3;
  filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.4));
}
.craft-slot img.hint-ghost{
  position:absolute;width:68%;height:68%;
  object-fit:contain;image-rendering:pixelated;
  opacity:.3;z-index:1;pointer-events:none;filter:brightness(1.3);
}

#arrow-area{display:flex;flex-direction:column;align-items:center;gap:8px}
#arrow-icon{
  width:38px;height:38px;
  background:var(--mc-bg);
  border:2px solid;border-color:var(--mc-ptl) var(--mc-pbr) var(--mc-pbr) var(--mc-ptl);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:var(--mc-text);
}
#result-slot{
  width:clamp(110px,17vw,165px);
  height:clamp(110px,17vw,165px);
  background:var(--mc-slot);
  border:3px solid;border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex;align-items:center;justify-content:center;
}
#result-slot img{width:76%;height:76%;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.4))}

#status-msg{font-size:clamp(11px,1.4vw,15px);font-weight:bold;color:transparent;min-height:20px;text-align:center;transition:color .3s}
#status-msg.fail{color:#ff4444;text-shadow:1px 1px 0 #800}
#status-msg.success{color:var(--mc-green);text-shadow:1px 1px 0 #2a5a1a}

/* 作る！ button row — below craft grid */
#craft-btn-row{
  padding:8px 14px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  border-top:3px solid var(--mc-darker);
  background:#9a9a9a;
  flex-shrink:0;min-height:58px;
}

/* ===== RIGHT PANEL: Inventory ===== */
#right-panel{
  width:clamp(260px,30%,340px);
  border-left:3px solid var(--mc-darker);
  display:flex;flex-direction:column;
  background:var(--mc-bg);overflow:hidden;
  flex-shrink:0;
}
#inv-header{
  background:#484848;border-bottom:2px solid var(--mc-darker);
  padding:6px;text-align:center;flex-shrink:0;
}
#inv-header-text{color:#fff;font-size:clamp(11px,1.4vw,15px);font-weight:bold;text-shadow:2px 2px 0 #000;letter-spacing:1px}

/* Large inventory slots — 2 columns × 6 rows, no scroll */
#inv-grid{
  flex:1;display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(6,1fr);
  gap:5px;padding:6px;
  overflow:hidden;
}
.inv-slot{
  background:var(--mc-slot);
  border:3px solid;border-color:var(--mc-tl) var(--mc-br) var(--mc-br) var(--mc-tl);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  cursor:pointer;position:relative;
  transition:background .1s;
  gap:2px;
  padding:4px 3px 5px;
  overflow:hidden;
  min-height:0;
}
.inv-slot:hover{background:#9a9a9a}
.inv-slot:active{border-color:var(--mc-br) var(--mc-tl) var(--mc-tl) var(--mc-br);background:#888}
.inv-slot img{
  width:52%;height:auto;max-height:52%;
  object-fit:contain;image-rendering:pixelated;flex-shrink:0;
  filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.4));
}
.inv-slot .inv-name{
  font-size:clamp(9px,1.05vw,13px);font-weight:bold;
  color:#fff;text-shadow:1px 1px 0 #000;
  text-align:center;line-height:1.2;
  word-break:keep-all;
  overflow:hidden;width:100%;
  padding:0 3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  flex-shrink:0;
}
.inv-slot.selected{
  background:var(--mc-sel-bg);
  border-color:var(--mc-sel-tl) var(--mc-sel-br) var(--mc-sel-br) var(--mc-sel-tl);
}
.inv-slot.hint-glow{animation:invGlow .6s ease-in-out infinite alternate}
@keyframes invGlow{
  from{background:var(--mc-slot);box-shadow:none}
  to{background:#f0d050;box-shadow:inset 0 0 14px rgba(255,215,0,.7)}
}

/* Buttons */
.mc-btn{
  font-family:inherit;font-size:clamp(10px,1.3vw,14px);
  font-weight:bold;color:#fff;background:#6e6e6e;
  border:3px solid;border-color:#aaa var(--mc-darker) var(--mc-darker) #aaa;
  padding:9px 16px;cursor:pointer;
  text-shadow:2px 2px 0 #000;white-space:nowrap;
  display:flex;align-items:center;gap:5px;line-height:1;
  transition:filter .05s;
}
.mc-btn:hover{filter:brightness(1.15)}
.mc-btn:active{border-color:var(--mc-darker) #aaa #aaa var(--mc-darker);filter:brightness(.9)}

/* 作る！ — big green hero button */
.mc-btn.craft-main{
  background:var(--mc-green);
  border-color:var(--mc-gl) var(--mc-gd) var(--mc-gd) var(--mc-gl);
  font-size:clamp(20px,2.8vw,28px);
  padding:12px 42px;min-height:52px;
  border-width:4px;letter-spacing:2px;
  box-shadow:0 5px 16px rgba(0,0,0,.45);
}
.mc-btn.craft-main:active{border-color:var(--mc-gd) var(--mc-gl) var(--mc-gl) var(--mc-gd)}
.mc-btn.green{background:var(--mc-green);border-color:var(--mc-gl) var(--mc-gd) var(--mc-gd) var(--mc-gl)}
.mc-btn.green:active{border-color:var(--mc-gd) var(--mc-gl) var(--mc-gl) var(--mc-gd)}

/* Bottom bar */
#bottom-bar{
  height:50px;min-height:50px;
  border-top:3px solid var(--mc-darker);
  background:#8b8b8b;
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:0 14px;flex-shrink:0;
}

/* Success modal */
#success-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:300}
#success-modal.show{display:flex}
#success-item-img{width:180px;height:180px;object-fit:contain;image-rendering:pixelated;animation:successSpin .6s cubic-bezier(.175,.885,.32,1.275) forwards;filter:drop-shadow(0 0 30px rgba(255,215,0,.7))}
#success-text{color:#FFD700;font-size:clamp(24px,5vw,44px);font-weight:bold;margin-top:16px;text-shadow:3px 3px 0 #000;animation:pulse 1s ease-in-out infinite}
#success-sub{color:#fff;font-size:clamp(13px,2vw,20px);margin-top:10px;text-shadow:2px 2px 0 #000}
#success-modal .mc-btn{margin-top:24px;font-size:17px;padding:12px 28px}
@keyframes successSpin{0%{transform:scale(0) rotate(-180deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes shake{0%,100%{transform:none}10%,50%,90%{transform:translateX(-7px)}30%,70%{transform:translateX(7px)}}
.shake-anim{animation:shake .4s cubic-bezier(.36,.07,.19,.97)}

#particles-container{position:fixed;inset:0;pointer-events:none;z-index:310}
.particle{position:absolute;animation:particleFly 1.3s ease-out forwards}
@keyframes particleFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2) rotate(360deg)}}

@media (max-height:520px){
  #topbar{height:24px;min-height:24px}
  #target-strip{padding:4px 10px}
  #target-slot{width:64px;height:64px}
  #target-name{font-size:14px}
  #materials-bar{padding:4px 10px;min-height:36px}
  .mat-tag{font-size:12px;padding:3px 6px}
  #craft-btn-row{min-height:46px;padding:5px 10px}
  .mc-btn.craft-main{font-size:16px;padding:8px 28px;min-height:40px}
  #bottom-bar{height:40px;min-height:40px}
  .craft-slot{width:clamp(72px,11vw,110px);height:clamp(72px,11vw,110px)}
  #result-slot{width:clamp(72px,11vw,110px);height:clamp(72px,11vw,110px)}
}
@media (max-width:680px){
  #right-panel{width:44%;min-width:200px}
  .craft-slot{width:clamp(78px,12vw,118px);height:clamp(78px,12vw,118px)}
  #result-slot{width:clamp(78px,12vw,118px);height:clamp(78px,12vw,118px)}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <span id="topbar-title">⛏ マイクラ クラフトクイズ</span>
    <span id="topbar-counter"></span>
  </div>
  <div id="main">
    <!-- LEFT -->
    <div id="left-area">
      <div id="target-strip">
        <div id="target-slot"><img id="target-img" src="" alt="" onerror="this.style.opacity='.3'"></div>
        <div id="target-info">
          <div id="target-label">これを作ろう！</div>
          <div id="target-name"></div>
        </div>
      </div>
      <div id="materials-bar"><span id="mat-label">必要:</span></div>
      <div id="craft-center">
        <div id="craft-row">
          <div id="craft-grid"></div>
          <div id="arrow-area">
            <div id="arrow-icon">➡</div>
            <div id="result-slot"></div>
          </div>
        </div>
        <div id="status-msg"></div>
      </div>
      <div id="craft-btn-row">
        <button class="mc-btn craft-main" id="btn-craft">✅ 作る！</button>
      </div>
    </div>
    <!-- RIGHT: Inventory -->
    <div id="right-panel">
      <div id="inv-header"><span id="inv-header-text">インベントリ</span></div>
      <div id="inv-grid"></div>
    </div>
  </div>
  <div id="bottom-bar">
    <button class="mc-btn" id="btn-reset">🔄 リセット</button>
    <button class="mc-btn" id="btn-hint">💡 ヒント</button>
    <button class="mc-btn" id="btn-next">➡ 次へ</button>
  </div>
</div>

<div id="success-modal">
  <img id="success-item-img" src="" alt="完成" onerror="this.style.opacity='.3'">
  <div id="success-text">できた！すごい！</div>
  <div id="success-sub"></div>
  <button class="mc-btn green" id="btn-more">🎮 もっと作る！</button>
</div>
<div id="particles-container"></div>

<script>
// =====================================================
// IMAGE URLS — from Minecraft Japan Wiki
// =====================================================
const IMG = {
  // 完成品（道具）
  diamond_pickaxe:    'https://static.wikitide.net/minecraftjapanwiki/5/54/Diamond_Pickaxe.png',
  iron_pickaxe:       'https://static.wikitide.net/minecraftjapanwiki/a/a2/Iron_Pickaxe.png',
  gold_pickaxe:       'https://static.wikitide.net/minecraftjapanwiki/9/95/Golden_Pickaxe.png',
  stone_pickaxe:      'https://static.wikitide.net/minecraftjapanwiki/4/40/Stone_Pickaxe.png',
  wood_pickaxe:       'https://static.wikitide.net/minecraftjapanwiki/b/b3/Wooden_Pickaxe.png',

  diamond_sword:      'https://static.wikitide.net/minecraftjapanwiki/a/a0/Diamond_Sword.png',

  stone_hoe:          'https://static.wikitide.net/minecraftjapanwiki/a/a3/Stone_Hoe.png',
  wood_hoe:           'https://static.wikitide.net/minecraftjapanwiki/b/b7/Wooden_Hoe.png',
  // 防具
  diamond_helmet:     'https://static.wikitide.net/minecraftjapanwiki/4/45/Diamond_Helmet_(item).png',
  iron_helmet:        'https://static.wikitide.net/minecraftjapanwiki/a/a2/Iron_Helmet_(item).png',

  diamond_chestplate: 'https://static.wikitide.net/minecraftjapanwiki/4/48/Diamond_Chestplate_(item).png',
  iron_chestplate:    'https://static.wikitide.net/minecraftjapanwiki/f/fc/Iron_Chestplate_(item).png',
  gold_chestplate:    'https://static.wikitide.net/minecraftjapanwiki/f/f8/Golden_Chestplate_(item).png',
  diamond_leggings:   'https://static.wikitide.net/minecraftjapanwiki/1/18/Diamond_Leggings_(item).png',

  gold_leggings:      'https://static.wikitide.net/minecraftjapanwiki/8/8a/Golden_Leggings_(item).png',
  diamond_boots:      'https://static.wikitide.net/minecraftjapanwiki/f/fc/Diamond_Boots_(item).png',

  bow:                'https://static.wikitide.net/minecraftjapanwiki/6/65/Bow.png',

  bucket:             'https://static.wikitide.net/minecraftjapanwiki/5/52/Bucket.png',
  crafting_table:     'https://static.wikitide.net/minecraftjapanwiki/d/d4/Crafting_Table.png',
  furnace:            'https://static.wikitide.net/minecraftjapanwiki/0/0f/Furnace.png',
  // 素材
  diamond:            'https://static.wikitide.net/minecraftjapanwiki/e/ea/Diamond.png',
  iron_ingot:         'https://static.wikitide.net/minecraftjapanwiki/0/0a/Iron_Ingot.png',
  gold_ingot:         'https://static.wikitide.net/minecraftjapanwiki/2/22/Gold_Ingot.png',
  cobblestone:        'https://static.wikitide.net/minecraftjapanwiki/6/67/Cobblestone.png',
  stick:              'https://static.wikitide.net/minecraftjapanwiki/a/aa/Stick.png',
  planks:             'https://static.wikitide.net/minecraftjapanwiki/c/c1/Oak_Planks.png',
  coal:               'https://static.wikitide.net/minecraftjapanwiki/a/a7/Coal.png',
  wheat:              'https://static.wikitide.net/minecraftjapanwiki/e/e2/Wheat.png',

  string:             'https://static.wikitide.net/minecraftjapanwiki/a/a0/String.png',

const INVENTORY_KEYS = [
  'diamond','iron_ingot','gold_ingot','cobblestone',
  'planks','stick','coal','wheat',
  'feather','flint','string'
];

const items = {
  diamond_pickaxe:{name:'ダイヤモンドのツルハシ'},
  iron_pickaxe:{name:'鉄のツルハシ'},
  gold_pickaxe:{name:'金のツルハシ'},
  stone_pickaxe:{name:'石のツルハシ'},
  wood_pickaxe:{name:'木のツルハシ'},
  diamond_sword:{name:'ダイヤモンドの剣'},
  iron_sword:{name:'鉄の剣'},
  gold_sword:{name:'金の剣'},
  stone_sword:{name:'石の剣'},
  wood_sword:{name:'木の剣'},

// =====================================================
// GAME ENGINE
// =====================================================
const game = {
  currentRecipe:null, gridState:Array(9).fill(null),
  selectedItem:null, hintActive:false,
  audioCtx:null, voices:[], questionCount:0, correctCount:0,

  init() {
    this.buildCraftGrid();
    this.buildInventory();
    document.getElementById('btn-reset').addEventListener('click', () => this.resetGrid());
    document.getElementById('btn-hint').addEventListener('click',  () => this.toggleHint());
    document.getElementById('btn-craft').addEventListener('click', () => this.checkRecipe());
    document.getElementById('btn-next').addEventListener('click',  () => this.nextQuestion());
    document.getElementById('btn-more').addEventListener('click',  () => this.nextQuestion());
    const initAudio = () => {
      if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
    };
    document.addEventListener('touchstart', initAudio, {once:true});
    document.addEventListener('click', initAudio, {once:true});
    if (window.speechSynthesis) {
      this.voices = speechSynthesis.getVoices();
      speechSynthesis.onvoiceschanged = () => { this.voices = speechSynthesis.getVoices(); };
    }
    this.nextQuestion();
  },

  speak(text) {
    try {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ja-JP'; u.rate = 0.9; u.pitch = 1.05;
      const v = this.voices.find(v => v.lang && v.lang.includes('ja'));
      if (v) u.voice = v;
      speechSynthesis.speak(u);
    } catch(e) {}
  },

  playSound(type) {
    if (!this.audioCtx) return;
    try {
      const ctx = this.audioCtx, now = ctx.currentTime;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type === 'click') {
        osc.type='square'; osc.frequency.setValueAtTime(600,now); osc.frequency.exponentialRampToValueAtTime(200,now+.06);
        gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.001,now+.06);
        osc.start(now); osc.stop(now+.06);
      } else if (type === 'place') {
        osc.type='square'; osc.frequency.setValueAtTime(250,now); osc.frequency.exponentialRampToValueAtTime(500,now+.07);
        gain.gain.setValueAtTime(.18,now); gain.gain.exponentialRampToValueAtTime(.001,now+.1);
        osc.start(now); osc.stop(now+.1);
      } else if (type === 'remove') {
        osc.type='triangle'; osc.frequency.setValueAtTime(500,now); osc.frequency.exponentialRampToValueAtTime(180,now+.08);
        gain.gain.setValueAtTime(.12,now); gain.gain.exponentialRampToValueAtTime(.001,now+.08);
        osc.start(now); osc.stop(now+.08);
      } else if (type === 'success') {
        osc.disconnect(); gain.disconnect();
        [523,659,784,1047].forEach((f,i) => {
          const o=ctx.createOscillator(), g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type='triangle'; o.frequency.value=f;
          const t=now+i*.12;
          g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.35);
          o.start(t); o.stop(t+.35);
        });
      } else if (type === 'fail') {
        osc.type='sawtooth'; osc.frequency.setValueAtTime(200,now); osc.frequency.exponentialRampToValueAtTime(80,now+.25);
        gain.gain.setValueAtTime(.18,now); gain.gain.exponentialRampToValueAtTime(.001,now+.25);
        osc.start(now); osc.stop(now+.25);
      }
    } catch(e) {}
  },

  vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch(e) {} },

  buildCraftGrid() {
    const g = document.getElementById('craft-grid');
    g.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const slot = document.createElement('div');
      slot.className = 'craft-slot';
      slot.dataset.idx = i;
      const h = e => { e.preventDefault(); this.handleCraftClick(i); };
      slot.addEventListener('click', h);
      slot.addEventListener('touchend', h);
      g.appendChild(slot);
    }
  },

  buildInventory() {
    const g = document.getElementById('inv-grid');
    g.innerHTML = '';
    INVENTORY_KEYS.forEach(key => {
      const slot = document.createElement('div');
      slot.className = 'inv-slot';
      slot.dataset.itemId = key;
      const img = document.createElement('img');
      img.src = items[key].img;
      img.alt = items[key].name;
      img.draggable = false;
      img.onerror = () => { img.style.opacity = '.25'; };
      slot.appendChild(img);
      const nm = document.createElement('div');
      nm.className = 'inv-name';
      nm.textContent = items[key].name;
      slot.appendChild(nm);
      const h = e => { e.preventDefault(); this.handleInvClick(key); };
      slot.addEventListener('click', h);
      slot.addEventListener('touchend', h);
      g.appendChild(slot);
    });
    // Add one empty slot to complete the 2×6 grid (11 items → 12th is blank)
    const empty = document.createElement('div');
    empty.className = 'inv-slot';
    empty.style.cursor = 'default';
    empty.style.background = 'rgba(0,0,0,0.08)';
    empty.style.borderColor = 'rgba(0,0,0,0.15)';
    g.appendChild(empty);
  },

  handleInvClick(key) {
    this.playSound('click');
    this.selectedItem = (this.selectedItem === key) ? null : key;
    if (this.selectedItem) this.speak(items[key].name);
    this.updateInvHighlight();
  },

  handleCraftClick(idx) {
    if (this.gridState[idx]) {
      this.gridState[idx] = null;
      this.playSound('remove');
    } else if (this.selectedItem) {
      this.gridState[idx] = this.selectedItem;
      this.playSound('place');
    } else return;
    this.refreshCraftDisplay();
    this.refreshMaterials();
    this.refreshResult();
  },

  updateInvHighlight() {
    document.querySelectorAll('.inv-slot').forEach(s => {
      s.classList.toggle('selected', s.dataset.itemId === this.selectedItem);
    });
  },

  refreshCraftDisplay() {
    const slots = document.querySelectorAll('.craft-slot');
    const recipe = this.currentRecipe;
    slots.forEach((slot, i) => {
      slot.querySelectorAll('img').forEach(img => img.remove());
      if (this.hintActive && recipe) {
        const hk = recipe.grid[Math.floor(i/3)][i%3];
        if (hk && !this.gridState[i]) {
          const gh = document.createElement('img');
          gh.className = 'hint-ghost';
          gh.src = items[hk].img;
          gh.draggable = false;
          slot.appendChild(gh);
        }
      }
      if (this.gridState[i]) {
        const img = document.createElement('img');
        img.className = 'placed-item';
        img.src = items[this.gridState[i]].img;
        img.draggable = false;
        img.onerror = () => { img.style.opacity = '.25'; };
        slot.appendChild(img);
      }
    });
  },

  refreshMaterials() {
    const bar = document.getElementById('materials-bar');
    bar.innerHTML = '<span id="mat-label">必要:</span>';
    if (!this.currentRecipe) return;
    const needed = {};
    this.currentRecipe.grid.flat().filter(Boolean).forEach(k => { needed[k] = (needed[k]||0)+1; });
    const placed = {};
    this.gridState.filter(Boolean).forEach(k => { placed[k] = (placed[k]||0)+1; });
    Object.entries(needed).forEach(([key, total]) => {
      const rem = total - Math.min(placed[key]||0, total);
      const tag = document.createElement('span');
      tag.className = 'mat-tag' + (rem <= 0 ? ' done' : '');
      const img = document.createElement('img');
      img.src = items[key].img;
      img.draggable = false;
      img.onerror = () => { img.style.opacity = '.25'; };
      tag.appendChild(img);
      tag.appendChild(document.createTextNode(items[key].name + ' ×' + rem));
      bar.appendChild(tag);
    });
  },

  refreshResult() {
    const slot = document.getElementById('result-slot');
    slot.innerHTML = '';
    if (this.checkMatch()) {
      const img = document.createElement('img');
      img.src = items[this.currentRecipe.id].img;
      img.draggable = false;
      img.onerror = () => { img.style.opacity = '.25'; };
      slot.appendChild(img);
    }
  },

  refreshHintInv() {
    if (!this.currentRecipe) return;
    const nk = new Set(this.currentRecipe.grid.flat().filter(Boolean));
    document.querySelectorAll('.inv-slot').forEach(s => {
      s.classList.toggle('hint-glow', this.hintActive && nk.has(s.dataset.itemId));
    });
  },

  checkMatch() {
    if (!this.currentRecipe) return false;
    for (let r = 0; r < 3; r++)
      for (let c = 0; c < 3; c++)
        if ((this.currentRecipe.grid[r][c]||null) !== (this.gridState[r*3+c]||null)) return false;
    return true;
  },

  resetGrid() {
    this.playSound('click');
    this.gridState = Array(9).fill(null);
    this.selectedItem = null; this.hintActive = false;
    this.clearStatus(); this.updateInvHighlight();
    this.refreshCraftDisplay(); this.refreshMaterials();
    this.refreshResult(); this.refreshHintInv();
  },

  toggleHint() {
    this.playSound('click');
    this.hintActive = !this.hintActive;
    this.speak(this.hintActive ? 'ヒント！ 正しい場所を見てみよう' : 'ヒントを隠したよ');
    this.refreshCraftDisplay(); this.refreshHintInv();
  },

  checkRecipe() {
    this.playSound('click');
    this.checkMatch() ? this.onSuccess() : this.onFail();
  },

  nextQuestion() {
    document.getElementById('success-modal').classList.remove('show');
    let idx;
    do { idx = Math.floor(Math.random() * recipes.length); }
    while (recipes.length > 1 && this.currentRecipe && recipes[idx].id === this.currentRecipe.id);
    this.currentRecipe = recipes[idx];
    this.questionCount++;
    this.gridState = Array(9).fill(null);
    this.selectedItem = null; this.hintActive = false;
    const r = this.currentRecipe;
    document.getElementById('target-img').src = items[r.id].img;
    document.getElementById('target-name').textContent = items[r.id].name;
    document.getElementById('topbar-counter').textContent = this.correctCount + '/' + (this.questionCount-1) + ' 正解';
    this.clearStatus(); this.updateInvHighlight();
    this.refreshCraftDisplay(); this.refreshMaterials();
    this.refreshResult(); this.refreshHintInv();
    this.speak(items[r.id].name + ' を作ろう！');
  },

  onSuccess() {
    this.playSound('success'); this.vibrate([100,50,100]);
    this.correctCount++;
    document.getElementById('topbar-counter').textContent = this.correctCount + '/' + this.questionCount + ' 正解';
    this.refreshResult();
    const r = this.currentRecipe;
    document.getElementById('success-item-img').src = items[r.id].img;
    document.getElementById('success-sub').textContent = items[r.id].name + ' ができました！';
    document.getElementById('success-modal').classList.add('show');
    this.spawnParticles();
    this.speak(items[r.id].name + ' ができた！ すごい！ やったね！');
    const msg = document.getElementById('status-msg');
    msg.textContent = '🎉 せいこう！'; msg.className = 'success';
  },

  onFail() {
    this.playSound('fail'); this.vibrate(200);
    const fr = document.getElementById('craft-center');
    fr.classList.remove('shake-anim'); void fr.offsetWidth; fr.classList.add('shake-anim');
    const msg = document.getElementById('status-msg');
    msg.textContent = '❌ もう一度 調べてみよう！'; msg.className = 'fail';
    this.speak('もう一度 調べてみよう');
  },

  clearStatus() {
    const msg = document.getElementById('status-msg');
    msg.textContent = ''; msg.className = '';
  },

  spawnParticles() {
    const c = document.getElementById('particles-container');
    c.innerHTML = '';
    const cx = window.innerWidth/2, cy = window.innerHeight/2;
    const colors = ['#FFD700','#FFA500','#FFEC00','#FF6B6B','#7FFF00','#00BFFF','#FF69B4','#fff'];
    for (let i = 0; i < 50; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const a = Math.random() * Math.PI * 2;
      const d = 80 + Math.random() * 220;
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      const sz = 7 + Math.random() * 11;
      p.style.width = sz + 'px'; p.style.height = sz + 'px';
      p.style.setProperty('--dx', (Math.cos(a)*d) + 'px');
      p.style.setProperty('--dy', (Math.sin(a)*d - 60) + 'px');
      p.style.animationDelay = (Math.random() * .3) + 's';
      c.appendChild(p);
    }
    setTimeout(() => { c.innerHTML = ''; }, 1900);
  },
};

window.addEventListener('DOMContentLoaded', () => game.init());
